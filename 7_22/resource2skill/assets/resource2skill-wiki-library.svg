<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1060" viewBox="0 0 1800 1060">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="800" fill="#102A25" text-anchor="start">为什么要同时维护 Skill Wiki 和 Skill Library？</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">它们不是重复存储：一个负责“知道该选什么”，另一个负责“真正把事情做出来”。</text><rect x="120" y="214" width="720" height="650" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="120" y="214" width="720" height="104" rx="28" fill="#2563EB" stroke="none" stroke-width="3"/><text x="480" y="282" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle">Skill Wiki：给 Agent 的技能说明书与索引</text><rect x="168" y="360" width="246" height="408" rx="22" fill="#FFFFFF" stroke="#B7D0FB" stroke-width="3"/><text x="291" y="425" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="800" fill="#2563EB" text-anchor="middle">一个技能目录</text><text x="206" y="488" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="206" dy="0">meta.json</tspan><tspan x="206" dy="54">text/</tspan><tspan x="206" dy="54">overview.md</tspan><tspan x="206" dy="54">visual/...</tspan><tspan x="206" dy="54">code/...</tspan></text><rect x="462" y="360" width="320" height="408" rx="22" fill="#F7FAFF" stroke="#B7D0FB" stroke-width="3"/><text x="500" y="425" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="500" dy="0">它回答：</tspan><tspan x="500" dy="52">• 适用于什么任务？</tspan><tspan x="500" dy="52">• 来源与许可证是什么？</tspan><tspan x="500" dy="52">• 有没有视觉参考？</tspan><tspan x="500" dy="52">• 是否通过</tspan><tspan x="500" dy="52">  可执行检查？</tspan></text><text x="480" y="824" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#2563EB" text-anchor="middle">检索、筛选、可追溯</text><rect x="960" y="214" width="720" height="650" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="960" y="214" width="720" height="104" rx="28" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="1320" y="282" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle">Skill Library：给工具调用的可执行资产</text><rect x="1008" y="360" width="246" height="408" rx="22" fill="#FFFFFF" stroke="#9FD5B7" stroke-width="3"/><text x="1131" y="425" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="800" fill="#0A5A48" text-anchor="middle">运行时资产</text><text x="1046" y="500" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1046" dy="0">Python 组件</tspan><tspan x="1046" dy="64">模板 / 预设</tspan><tspan x="1046" dy="64">主题 / 公式</tspan><tspan x="1046" dy="64">场景脚手架</tspan></text><rect x="1302" y="360" width="320" height="408" rx="22" fill="#F4FCF7" stroke="#9FD5B7" stroke-width="3"/><text x="1340" y="435" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1340" dy="0">它负责：</tspan><tspan x="1340" dy="62">• 写入项目文件</tspan><tspan x="1340" dy="62">• 创建工作区</tspan><tspan x="1340" dy="62">• 调用领域工具</tspan><tspan x="1340" dy="62">• 产出最终 Artifact</tspan></text><text x="1320" y="824" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="800" fill="#0A5A48" text-anchor="middle">执行、落地、生成文件</text><path d="M 838 538 L 956 538" fill="none" stroke="#506C64" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/><text x="897" y="500" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="800" fill="#58706A" text-anchor="middle">skill_id</text><rect x="220" y="922" width="1360" height="86" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="900" y="978" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="650" fill="#E5FBEF" text-anchor="middle">可以把 Wiki 看成“带证据的目录”，把 Library 看成“能被工具调用的工具箱”。</text>
</svg>
