<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="990" viewBox="0 0 1800 990">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="800" fill="#102A25" text-anchor="start">一次真实任务在运行时怎样流过 Resource2Skill？</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">以“做一个网页”为例：Agent 先决定需要哪些能力，再用可执行资产把页面组起来。</text><rect x="95" y="218" width="290" height="190" rx="28" fill="#FFF3E6" stroke="#F0B76E" stroke-width="3" filter="url(#shadow)"/><rect x="125" y="242" width="74" height="52" rx="26" fill="#D97706" stroke="none" stroke-width="3"/><text x="162" y="277" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text><text x="125" y="330" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="125" dy="0">用户 Brief</tspan><tspan x="125" dy="52">“做一个公益组织落地页”</tspan></text><path d="M 397 313 L 467 313" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="478" y="218" width="290" height="190" rx="28" fill="#EEE8FF" stroke="#B6A4E6" stroke-width="3" filter="url(#shadow)"/><rect x="508" y="242" width="74" height="52" rx="26" fill="#6D28D9" stroke="none" stroke-width="3"/><text x="545" y="277" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text><text x="508" y="330" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="508" dy="0">Task Planner</tspan><tspan x="508" dy="52">拆成 hero、活动、FAQ…</tspan></text><path d="M 780 313 L 850 313" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="861" y="218" width="290" height="190" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="891" y="242" width="74" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="928" y="277" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text><text x="891" y="330" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="891" dy="0">先检索</tspan><tspan x="891" dy="52">BM25 找候选技能</tspan></text><path d="M 1163 313 L 1233 313" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1244" y="218" width="290" height="190" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="1274" y="242" width="74" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="1311" y="277" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text><text x="1274" y="330" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="1274" dy="0">再重排序</tspan><tspan x="1274" dy="52">LLM 选出更贴合的 skill_id</tspan></text><path d="M 1390 420 L 1390 514" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1244" y="528" width="290" height="190" rx="28" fill="#F2F5F4" stroke="#B9CDC6" stroke-width="3" filter="url(#shadow)"/><rect x="1274" y="552" width="74" height="52" rx="26" fill="#0F766E" stroke="none" stroke-width="3"/><text x="1311" y="587" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text><text x="1274" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="1274" dy="0">按 section 组合</tspan><tspan x="1274" dy="52">并把代码写入工作区</tspan></text><path d="M 1233 623 L 1163 623" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="861" y="528" width="290" height="190" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="891" y="552" width="74" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="928" y="587" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">6</text><text x="891" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="891" dy="0">MCP / Adapter</tspan><tspan x="891" dy="52">调用领域实际工具</tspan></text><path d="M 850 623 L 780 623" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="478" y="528" width="290" height="190" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="508" y="552" width="74" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="545" y="587" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">7</text><text x="508" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="508" dy="0">产物生成</tspan><tspan x="508" dy="52">HTML、样式、资源文件</tspan></text><path d="M 397 623 L 327 623" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="95" y="528" width="290" height="190" rx="28" fill="#FFF3E6" stroke="#F0B76E" stroke-width="3" filter="url(#shadow)"/><rect x="125" y="552" width="74" height="52" rx="26" fill="#D97706" stroke="none" stroke-width="3"/><text x="162" y="587" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">8</text><text x="125" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#102A25" text-anchor="start"><tspan x="125" dy="0">检查与反思</tspan><tspan x="125" dy="52">必要时换技能或再生成</tspan></text><rect x="160" y="800" width="1480" height="118" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="900" y="850" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="500" fill="#E5FBEF" text-anchor="middle"><tspan x="900" dy="0">这里的“组合”很重要：不是找一个万能 Skill，而是让多个小能力按任务结构协作。</tspan><tspan x="900" dy="44">Web 域还提供面向页面组合与视觉检查的流程。</tspan></text>
</svg>
