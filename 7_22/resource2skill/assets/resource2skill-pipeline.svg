<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1020" viewBox="0 0 1800 1020">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="800" fill="#102A25" text-anchor="start">Resource2Skill 的主线：资源不是直接塞给 Agent，而是先变成可管理的 Skill</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">每一步都补上“能否使用、如何查找、是否可追溯、怎样执行”的缺口。</text><rect x="90" y="215" width="300" height="560" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="122" y="246" width="146" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="195" y="281" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">输入资源</text><text x="132" y="356" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="132" dy="0">教程视频</tspan><tspan x="132" dy="62">文章与参考资料</tspan><tspan x="132" dy="62">代码与静态资产</tspan></text><text x="132" y="644" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#0F766E" text-anchor="start">人类容易理解</text><text x="132" y="690" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="500" fill="#58706A" text-anchor="start">机器难以直接复用</text><path d="M 402 497 L 490 497" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="446" y="458" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">采集</text><rect x="500" y="215" width="300" height="560" rx="28" fill="#FFF3E6" stroke="#F0B76E" stroke-width="3" filter="url(#shadow)"/><rect x="532" y="246" width="172" height="52" rx="26" fill="#D97706" stroke="none" stroke-width="3"/><text x="618" y="281" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">Candidate Skill</text><text x="542" y="356" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="542" dy="0">来源 URL / 作者</tspan><tspan x="542" dy="62">代码、文本、视觉素材</tspan><tspan x="542" dy="62">许可证与适用范围</tspan></text><text x="542" y="644" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#D97706" text-anchor="start">先保留上下文</text><text x="542" y="690" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="500" fill="#58706A" text-anchor="start">再决定是否可收录</text><path d="M 812 497 L 900 497" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="856" y="458" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">清洗 / QA</text><rect x="910" y="215" width="385" height="560" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="942" y="246" width="172" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="1028" y="281" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">Skill Wiki</text><text x="952" y="356" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="952" dy="0">meta：来源、许可、标签</tspan><tspan x="952" dy="57">text：概览与适用条件</tspan><tspan x="952" dy="57">visual：参考图</tspan><tspan x="952" dy="57">code：可读的实现资产</tspan></text><text x="952" y="644" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#2563EB" text-anchor="start">不确定或不合规的项</text><text x="952" y="690" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="500" fill="#58706A" text-anchor="start">进入 quarantine，不进索引</text><path d="M 1306 497 L 1394 497" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="1350" y="458" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">检索 / 组合</text><rect x="1404" y="215" width="306" height="560" rx="28" fill="#EEE8FF" stroke="#B6A4E6" stroke-width="3" filter="url(#shadow)"/><rect x="1436" y="246" width="205" height="52" rx="26" fill="#6D28D9" stroke="none" stroke-width="3"/><text x="1538" y="281" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">Agent Runtime</text><text x="1448" y="356" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1448" dy="0">任务拆解</tspan><tspan x="1448" dy="57">BM25 候选池</tspan><tspan x="1448" dy="57">LLM 重排序</tspan><tspan x="1448" dy="57">MCP 调真实工具</tspan></text><text x="1448" y="644" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#6D28D9" text-anchor="start">最终产生</text><text x="1448" y="690" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#58706A" text-anchor="start">网页 / PPT / 表格 / 场景 / 音频</text><rect x="118" y="838" width="1470" height="104" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="853" y="904" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="650" fill="#E5FBEF" text-anchor="middle">关键不是“把资料喂进模型”，而是把资料沉淀成可发现、可执行、可审计的中间层。</text>
</svg>
