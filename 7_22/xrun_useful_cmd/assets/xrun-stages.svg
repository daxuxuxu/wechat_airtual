<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="970" viewBox="0 0 1800 970">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="800" fill="#102A25" text-anchor="start">xrun 的关键：同一个入口，驱动三个不同阶段</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">不要把所有 option 都当成“运行参数”。它们在不同阶段生效，能解决的问题也不同。</text><rect x="105" y="230" width="470" height="480" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="140" y="258" width="178" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="229" y="293" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">Compile</text><text x="150" y="380" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="150" dy="0">读源文件与 package</tspan><tspan x="150" dy="65">解析 SystemVerilog</tspan><tspan x="150" dy="65">处理 include / define</tspan><tspan x="150" dy="65">决定哪些内容进入库</tspan></text><text x="150" y="654" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="700" fill="#2563EB" text-anchor="start">典型：-sv、-f、+incdir+、+define+</text><path d="M 587 470 L 685 470" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="636" y="432" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">构建</text><rect x="705" y="230" width="470" height="480" rx="28" fill="#EEE8FF" stroke="#B6A4E6" stroke-width="3" filter="url(#shadow)"/><rect x="740" y="258" width="196" height="52" rx="26" fill="#6D28D9" stroke="none" stroke-width="3"/><text x="838" y="293" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">Elaborate</text><text x="750" y="380" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="750" dy="0">确定 top 与层级</tspan><tspan x="750" dy="65">连接 module / interface</tspan><tspan x="750" dy="65">准备 debug 可见性</tspan><tspan x="750" dy="65">插入覆盖率等 instrumentation</tspan></text><text x="750" y="654" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="700" fill="#6D28D9" text-anchor="start">典型：-top、-access、coverage 相关配置</text><path d="M 1187 470 L 1285 470" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="1236" y="432" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">启动</text><rect x="1305" y="230" width="390" height="480" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="1340" y="258" width="112" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="1396" y="293" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">Run</text><text x="1350" y="380" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1350" dy="0">选择 UVM test</tspan><tspan x="1350" dy="65">设置随机 seed</tspan><tspan x="1350" dy="65">控制 timeout / verbosity</tspan><tspan x="1350" dy="65">执行并产生 log / wave</tspan></text><text x="1350" y="654" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="700" fill="#0A5A48" text-anchor="start">典型：test name、seed、timeout</text><rect x="155" y="790" width="1490" height="112" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="900" y="861" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="650" fill="#E5FBEF" text-anchor="middle">判断口诀：需要重新建构仿真模型的，放在 Compile / Elaborate；只改变这一次 test 行为的，放在 Run。</text>
</svg>
