<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="930" viewBox="0 0 1800 930">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="800" fill="#102A25" text-anchor="start">最常见误解：-access、-gui 和 waveform 不是一回事</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">可见性让你“有资格看”；probe 才决定“有没有把信号录下来”。</text><rect x="115" y="246" width="330" height="368" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="145" y="274" width="176" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="233" y="309" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">-access</text><text x="155" y="390" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="155" dy="0">保留 read / write /</tspan><tspan x="155" dy="58">connectivity 等</tspan><tspan x="155" dy="58">debug access</tspan><tspan x="155" dy="58">不会自动 dump wave</tspan></text><path d="M 457 430 L 555 430" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="506" y="394" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">可见</text><rect x="575" y="246" width="330" height="368" rx="28" fill="#FFF3E6" stroke="#F0B76E" stroke-width="3" filter="url(#shadow)"/><rect x="605" y="274" width="126" height="52" rx="26" fill="#D97706" stroke="none" stroke-width="3"/><text x="668" y="309" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">probe</text><text x="615" y="390" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="615" dy="0">选择 scope</tspan><tspan x="615" dy="58">选择信号与深度</tspan><tspan x="615" dy="58">写入 SHM</tspan><tspan x="615" dy="58">控制记录范围</tspan></text><path d="M 917 430 L 1015 430" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="966" y="394" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">录制</text><rect x="1035" y="246" width="330" height="368" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="1065" y="274" width="160" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="1145" y="309" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">waves.shm</text><text x="1075" y="390" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1075" dy="0">仿真数据库</tspan><tspan x="1075" dy="58">可供 post-process</tspan><tspan x="1075" dy="58">在 SimVision 中</tspan><tspan x="1075" dy="58">打开查看</tspan></text><path d="M 1377 430 L 1475 430" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="1426" y="394" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="700" fill="#58706A" text-anchor="middle">分析</text><rect x="1495" y="246" width="200" height="368" rx="28" fill="#EEE8FF" stroke="#B6A4E6" stroke-width="3" filter="url(#shadow)"/><rect x="1525" y="274" width="108" height="52" rx="26" fill="#6D28D9" stroke="none" stroke-width="3"/><text x="1579" y="309" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">GUI</text><text x="1530" y="412" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1530" dy="0">SimVision</tspan><tspan x="1530" dy="56">看波形</tspan><tspan x="1530" dy="56">查 driver</tspan><tspan x="1530" dy="56">定位问题</tspan></text><rect x="205" y="742" width="1390" height="112" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="900" y="790" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="500" fill="#E5FBEF" text-anchor="middle"><tspan x="900" dy="0">-gui 只是以 GUI 模式启动；batch run 想保留波形，仍要明确配置 probe / waveform database。</tspan><tspan x="900" dy="42">probe 范围越大，数据库与 runtime 开销通常也越大。</tspan></text>
</svg>
