<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
<defs>
  <linearGradient id="coverGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0A5A48"/>
    <stop offset="100%" stop-color="#159477"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173E35" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 z" fill="#5B716A"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#F5F8F6"/>
<text x="90" y="86" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="46" font-weight="800" fill="#102A25" text-anchor="start">把长命令拆成四份 option file，差异才可追踪</text><text x="90" y="132" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#58706A" text-anchor="start">文件名只是团队约定；真正重要的是每一份文件只放同一生效阶段的配置。</text><rect x="100" y="220" width="365" height="480" rx="28" fill="#EAF1FF" stroke="#8FB3F4" stroke-width="3" filter="url(#shadow)"/><rect x="132" y="248" width="210" height="52" rx="26" fill="#2563EB" stroke="none" stroke-width="3"/><text x="237" y="283" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">compfiles.f</text><text x="142" y="368" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="142" dy="0">源文件顺序</tspan><tspan x="142" dy="63">package / interface</tspan><tspan x="142" dy="63">RTL 与 testbench</tspan><tspan x="142" dy="63">第三方模型</tspan></text><text x="142" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#2563EB" text-anchor="start">回答：编什么？</text><rect x="505" y="220" width="365" height="480" rx="28" fill="#FFF3E6" stroke="#F0B76E" stroke-width="3" filter="url(#shadow)"/><rect x="537" y="248" width="206" height="52" rx="26" fill="#D97706" stroke="none" stroke-width="3"/><text x="640" y="283" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">compopts.f</text><text x="547" y="368" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="547" dy="0">-sv / -64bit</tspan><tspan x="547" dy="63">+incdir+</tspan><tspan x="547" dy="63">+define+</tspan><tspan x="547" dy="63">语言与编译策略</tspan></text><text x="547" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#D97706" text-anchor="start">回答：怎样编？</text><rect x="930" y="220" width="365" height="480" rx="28" fill="#EEE8FF" stroke="#B6A4E6" stroke-width="3" filter="url(#shadow)"/><rect x="962" y="248" width="204" height="52" rx="26" fill="#6D28D9" stroke="none" stroke-width="3"/><text x="1064" y="283" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">elabopts.f</text><text x="972" y="368" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="972" dy="0">-top</tspan><tspan x="972" dy="63">-access +rwc</tspan><tspan x="972" dy="63">coverage / bind</tspan><tspan x="972" dy="63">结构与可见性</tspan></text><text x="972" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#6D28D9" text-anchor="start">回答：建成什么模型？</text><rect x="1335" y="220" width="365" height="480" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3" filter="url(#shadow)"/><rect x="1367" y="248" width="194" height="52" rx="26" fill="#0A5A48" stroke="none" stroke-width="3"/><text x="1464" y="283" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">runopts.f</text><text x="1377" y="368" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#102A25" text-anchor="start"><tspan x="1377" dy="0">Tcl input</tspan><tspan x="1377" dy="63">log / wave policy</tspan><tspan x="1377" dy="63">默认 UVM runtime</tspan><tspan x="1377" dy="63">运行期行为</tspan></text><text x="1377" y="638" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="800" fill="#0A5A48" text-anchor="start">回答：这次怎么跑？</text><path d="M 280 762 L 1510 762" fill="none" stroke="#5B716A" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/><text x="900" y="730" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#102A25" text-anchor="middle">xrun -f compfiles.f -f compopts.f -f elabopts.f -f runopts.f</text><rect x="210" y="838" width="1380" height="88" rx="28" fill="#113D34" stroke="none" stroke-width="3"/><text x="900" y="895" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="650" fill="#E5FBEF" text-anchor="middle">test name、seed 这类单次变化放在命令行或 run config，避免为每个 test 重编一次。</text>
</svg>
