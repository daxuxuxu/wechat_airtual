<rect x="70" y="52" width="1660" height="720" rx="28" fill="#102A25" stroke="#234C42" stroke-width="3" filter="url(#shadow)"/><rect x="70" y="52" width="1660" height="78" rx="28" fill="#173E35" stroke="none" stroke-width="3"/><circle cx="116" cy="92" r="12" fill="#FF6B6B"/><circle cx="154" cy="92" r="12" fill="#F7B955"/><circle cx="192" cy="92" r="12" fill="#5FE08A"/><text x="900" y="100" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#CBEADB" text-anchor="middle">xrun · maintainable command-line example</text><text x="132" y="190" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#91E3B0" text-anchor="start"># 以四份 option file 启动一次 UVM smoke</text><text x="132" y="248" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">xrun \</text><text x="132" y="306" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  -f snippets/compfiles.f \</text><text x="132" y="364" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  -f snippets/compopts.f \</text><text x="132" y="422" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  -f snippets/elabopts.f \</text><text x="132" y="480" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  -f snippets/runopts.f \</text><text x="132" y="538" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  +UVM_TESTNAME=smoke_test \</text><text x="132" y="596" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  +ntb_random_seed=20260722 \</text><text x="132" y="654" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="500" fill="#F0F6F4" text-anchor="start">  -l logs/smoke_seed20260722.log</text><rect x="70" y="820" width="1660" height="116" rx="28" fill="#E7F8F0" stroke="#8CC9AA" stroke-width="3"/><text x="900" y="892" font-family="Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="650" fill="#0A5A48" text-anchor="middle">单次 test 与 seed 在命令行覆盖；会影响 build 的 source、define、top、access 放回对应 option file。</text>
</svg>
