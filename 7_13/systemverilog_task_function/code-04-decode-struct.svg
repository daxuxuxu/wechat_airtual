  <text x="112" y="184" class="line-no">01</text><text x="188" y="184" class="code" xml:space="preserve">typedef struct packed {</text><text x="112" y="232" class="line-no">02</text><text x="188" y="232" class="code" xml:space="preserve">    logic       hit;</text><text x="112" y="280" class="line-no">03</text><text x="188" y="280" class="code" xml:space="preserve">    logic [7:0] index;</text><text x="112" y="328" class="line-no">04</text><text x="188" y="328" class="code" xml:space="preserve">} lookup_result_t;</text><text x="112" y="376" class="line-no">05</text><text x="188" y="376" class="code" xml:space="preserve"></text><text x="112" y="424" class="line-no">06</text><text x="188" y="424" class="code" xml:space="preserve">function automatic lookup_result_t decode_addr(</text><text x="112" y="472" class="line-no">07</text><text x="188" y="472" class="code" xml:space="preserve">    input logic [31:0] addr</text><text x="112" y="520" class="line-no">08</text><text x="188" y="520" class="code" xml:space="preserve">);</text><text x="112" y="568" class="line-no">09</text><text x="188" y="568" class="code" xml:space="preserve">    lookup_result_t result;</text><text x="112" y="616" class="line-no">10</text><text x="188" y="616" class="code" xml:space="preserve"></text><text x="112" y="664" class="line-no">11</text><text x="188" y="664" class="code" xml:space="preserve">    result.hit   = (addr[31:28] == 4&#x27;h8);</text><text x="112" y="712" class="line-no">12</text><text x="188" y="712" class="code" xml:space="preserve">    result.index = addr[11:4];</text><text x="112" y="760" class="line-no">13</text><text x="188" y="760" class="code" xml:space="preserve">    return result;</text><text x="112" y="808" class="line-no">14</text><text x="188" y="808" class="code" xml:space="preserve">endfunction</text><text x="112" y="856" class="line-no">15</text><text x="188" y="856" class="code" xml:space="preserve"></text><text x="112" y="904" class="line-no">16</text><text x="188" y="904" class="code" xml:space="preserve">lookup_result_t lookup;</text><text x="112" y="952" class="line-no">17</text><text x="188" y="952" class="code" xml:space="preserve"></text><text x="112" y="1000" class="line-no">18</text><text x="188" y="1000" class="code" xml:space="preserve">always_comb begin</text><text x="112" y="1048" class="line-no">19</text><text x="188" y="1048" class="code" xml:space="preserve">    lookup = decode_addr(addr);</text><text x="112" y="1096" class="line-no">20</text><text x="188" y="1096" class="code" xml:space="preserve">end</text>
