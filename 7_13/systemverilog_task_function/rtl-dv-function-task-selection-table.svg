<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RTL 与 DV 场景中 function 和 task 的选型表</title>
  <desc id="desc">一张横向三列表格，列出常见 RTL/DV 场景、推荐的 SystemVerilog 构造以及选择原因。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#23313F" flood-opacity=".16"/>
    </filter>
    <style>
      .title { font: 700 37px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #D6EAF8; }
      .header { font: 700 31px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; }
      .scenario { font: 600 25px "DejaVu Sans Mono", Consolas, monospace; fill: #34495E; }
      .reason { font: 400 25px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #34495E; }
      .pill { font: 700 24px "DejaVu Sans Mono", Consolas, monospace; fill: #FFFFFF; }
      .footer { font: italic 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #566573; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#FFFFFF"/>
  <rect width="1600" height="92" fill="#23313F"/>
  <text x="74" y="53" class="title">RTL / DV 场景：该选 function 还是 task？</text>
  <text x="74" y="78" class="subtitle">如果语义需要跨 clock、event 或 handshake，优先使用 task</text>

  <g filter="url(#shadow)">
    <rect x="40" y="124" width="1520" height="690" rx="14" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="2"/>
    <rect x="40" y="124" width="480" height="82" rx="14" fill="#34495E"/>
    <path d="M506 124 H520 V206 H506 Z" fill="#34495E"/>
    <rect x="520" y="124" width="410" height="82" fill="#1F6FB5"/>
    <rect x="930" y="124" width="630" height="82" rx="14" fill="#E67E22"/>
    <path d="M930 124 H944 V206 H930 Z" fill="#E67E22"/>
  </g>

  <rect x="40" y="206" width="1520" height="101" fill="#FFFFFF"/>
  <rect x="40" y="307" width="1520" height="101" fill="#F4F6F7"/>
  <rect x="40" y="408" width="1520" height="101" fill="#FFFFFF"/>
  <rect x="40" y="509" width="1520" height="101" fill="#F4F6F7"/>
  <rect x="40" y="610" width="1520" height="101" fill="#FFFFFF"/>
  <rect x="40" y="711" width="1520" height="103" rx="14" fill="#F4F6F7"/>

  <path d="M520 124 V814 M930 124 V814 M40 206 H1560 M40 307 H1560 M40 408 H1560 M40 509 H1560 M40 610 H1560 M40 711 H1560" stroke="#D5D8DC" stroke-width="2"/>

  <text x="280" y="176" text-anchor="middle" class="header">场景</text>
  <text x="725" y="176" text-anchor="middle" class="header">更适合的构造</text>
  <text x="1245" y="176" text-anchor="middle" class="header">原因</text>

  <text x="82" y="267" class="scenario">combinational address decode</text>
  <rect x="575" y="230" width="300" height="52" rx="26" fill="#1F6FB5"/>
  <text x="725" y="264" text-anchor="middle" class="pill">function automatic</text>
  <text x="970" y="267" class="reason">无 time control，结果直接进入 expression</text>

  <text x="82" y="368" class="scenario">parity / CRC / expected data</text>
  <rect x="575" y="331" width="300" height="52" rx="26" fill="#1F6FB5"/>
  <text x="725" y="365" text-anchor="middle" class="pill">function automatic</text>
  <text x="970" y="368" class="reason">纯计算，适合 monitor 或 scoreboard 复用</text>

  <text x="82" y="469" class="scenario">UVM driver transaction</text>
  <rect x="604" y="432" width="242" height="52" rx="26" fill="#E67E22"/>
  <text x="725" y="466" text-anchor="middle" class="pill">task automatic</text>
  <text x="970" y="469" class="reason">需要等待 clock、credit、ready 或 response</text>

  <text x="82" y="570" class="scenario">reset sequence</text>
  <rect x="604" y="533" width="242" height="52" rx="26" fill="#E67E22"/>
  <text x="725" y="567" text-anchor="middle" class="pill">task automatic</text>
  <text x="970" y="570" class="reason">pulse width 和 release point 受时间控制</text>

  <text x="82" y="671" class="scenario">uvm_component::run_phase</text>
  <rect x="663" y="634" width="124" height="52" rx="26" fill="#E67E22"/>
  <text x="725" y="668" text-anchor="middle" class="pill">task</text>
  <text x="970" y="671" class="reason">run phase 本身是 time-consuming phase</text>

  <text x="82" y="772" class="scenario">uvm_object::do_compare / convert2string</text>
  <rect x="645" y="735" width="160" height="52" rx="26" fill="#1F6FB5"/>
  <text x="725" y="769" text-anchor="middle" class="pill">function</text>
  <text x="970" y="772" class="reason">返回 comparison result 或 string，不应推进时间</text>

  <text x="800" y="860" text-anchor="middle" class="footer">判断顺序：先问“要不要等待”，再问“要返回一个结果还是多个结果”。</text>
</svg>
