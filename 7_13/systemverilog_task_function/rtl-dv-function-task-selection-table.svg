<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">RTL 与 DV 场景中 function 和 task 的选型表</title>
  <desc id="desc">一张大字号横向三列表格，列出常见 RTL/DV 场景、推荐构造以及选择原因。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#23313F" flood-opacity=".16"/>
    </filter>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-weight: 400; fill: #D6EAF8; }
      .header { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 41px; font-weight: 700; fill: #FFFFFF; }
      .scenario { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 34px; font-weight: 600; fill: #34495E; }
      .reason { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 34px; font-weight: 400; fill: #34495E; }
      .pill { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 32px; font-weight: 700; fill: #FFFFFF; }
      .footer { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-style: italic; fill: #566573; }
    </style>
  </defs>
  <rect width="1600" height="1120" fill="#FFFFFF"/>
  <rect width="1600" height="94" fill="#23313F"/>
  <text x="70" y="55" class="title">RTL / DV 场景：该选 function 还是 task？</text>
  <text x="70" y="81" class="subtitle">如果语义需要跨 clock、event 或 handshake，优先使用 task</text>

  <g filter="url(#shadow)">
    <rect x="30" y="122" width="1540" height="960" rx="16" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="2"/>
    <rect x="30" y="122" width="470" height="90" rx="16" fill="#34495E"/>
    <path d="M484 122 H500 V212 H484 Z" fill="#34495E"/>
    <rect x="500" y="122" width="430" height="90" fill="#1F6FB5"/>
    <rect x="930" y="122" width="640" height="90" rx="16" fill="#E67E22"/>
    <path d="M930 122 H946 V212 H930 Z" fill="#E67E22"/>
  </g>

  <rect x="30" y="212" width="1540" height="145" fill="#FFFFFF"/>
  <rect x="30" y="357" width="1540" height="145" fill="#F4F6F7"/>
  <rect x="30" y="502" width="1540" height="145" fill="#FFFFFF"/>
  <rect x="30" y="647" width="1540" height="145" fill="#F4F6F7"/>
  <rect x="30" y="792" width="1540" height="145" fill="#FFFFFF"/>
  <rect x="30" y="937" width="1540" height="145" rx="16" fill="#F4F6F7"/>
  <path d="M500 122 V1082 M930 122 V1082 M30 212 H1570 M30 357 H1570 M30 502 H1570 M30 647 H1570 M30 792 H1570 M30 937 H1570" stroke="#D5D8DC" stroke-width="2"/>

  <text x="265" y="178" text-anchor="middle" class="header">场景</text>
  <text x="715" y="178" text-anchor="middle" class="header">更适合的构造</text>
  <text x="1250" y="178" text-anchor="middle" class="header">原因</text>

  <text x="76" y="270" class="scenario"><tspan x="76" dy="0">combinational</tspan><tspan x="76" dy="40">address decode</tspan></text>
  <rect x="550" y="258" width="330" height="58" rx="29" fill="#1F6FB5"/>
  <text x="715" y="296" text-anchor="middle" class="pill">function automatic</text>
  <text x="970" y="270" class="reason"><tspan x="970" dy="0">无 time control，结果直接</tspan><tspan x="970" dy="40">进入 expression</tspan></text>

  <text x="76" y="415" class="scenario"><tspan x="76" dy="0">parity / CRC /</tspan><tspan x="76" dy="40">expected data</tspan></text>
  <rect x="550" y="403" width="330" height="58" rx="29" fill="#1F6FB5"/>
  <text x="715" y="441" text-anchor="middle" class="pill">function automatic</text>
  <text x="970" y="415" class="reason"><tspan x="970" dy="0">纯计算，适合 monitor 或</tspan><tspan x="970" dy="40">scoreboard 复用</tspan></text>

  <text x="76" y="560" class="scenario"><tspan x="76" dy="0">UVM driver</tspan><tspan x="76" dy="40">transaction</tspan></text>
  <rect x="578" y="548" width="274" height="58" rx="29" fill="#E67E22"/>
  <text x="715" y="586" text-anchor="middle" class="pill">task automatic</text>
  <text x="970" y="560" class="reason"><tspan x="970" dy="0">需要等待 clock、credit、</tspan><tspan x="970" dy="40">ready 或 response</tspan></text>

  <text x="76" y="705" class="scenario">reset sequence</text>
  <rect x="578" y="693" width="274" height="58" rx="29" fill="#E67E22"/>
  <text x="715" y="731" text-anchor="middle" class="pill">task automatic</text>
  <text x="970" y="705" class="reason"><tspan x="970" dy="0">pulse width 和 release point</tspan><tspan x="970" dy="40">受时间控制</tspan></text>

  <text x="76" y="850" class="scenario"><tspan x="76" dy="0">uvm_component::</tspan><tspan x="76" dy="40">run_phase</tspan></text>
  <rect x="650" y="838" width="130" height="58" rx="29" fill="#E67E22"/>
  <text x="715" y="876" text-anchor="middle" class="pill">task</text>
  <text x="970" y="850" class="reason"><tspan x="970" dy="0">run phase 本身是</tspan><tspan x="970" dy="40">time-consuming phase</tspan></text>

  <text x="76" y="975" class="scenario"><tspan x="76" dy="0">uvm_object::</tspan><tspan x="76" dy="40">do_compare /</tspan><tspan x="76" dy="40">convert2string</tspan></text>
  <rect x="632" y="983" width="166" height="58" rx="29" fill="#1F6FB5"/>
  <text x="715" y="1021" text-anchor="middle" class="pill">function</text>
  <text x="970" y="995" class="reason"><tspan x="970" dy="0">返回 comparison result 或 string，</tspan><tspan x="970" dy="40">不应推进时间</tspan></text>

  <text x="800" y="1110" text-anchor="middle" class="footer">判断顺序：先问“要不要等待”，再问“要返回一个结果还是多个结果”。</text>
</svg>
