<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1270" viewBox="0 0 1600 1270" role="img" aria-label="byte-enable function 示例">
  <style>
    .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 38px; font-weight: 700; fill: #FFFFFF; }
    .status { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 27px; font-weight: 700; fill: #FFFFFF; }
    .line-no { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 28px; font-weight: 400; fill: #7F8C8D; }
    .code { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 35px; font-weight: 400; fill: #23313F; }
  </style>
  <rect width="1600" height="1270" fill="#FFFFFF"/>
  <rect width="1600" height="80" fill="#1F6FB5"/>
  <text x="54" y="51" class="title">byte-enable function 示例</text>
  <rect x="1240" y="19" width="310" height="42" rx="21" fill="#23313F" opacity=".94"/>
  <text x="1395" y="48" text-anchor="middle" class="status">SystemVerilog</text>
  <rect x="40" y="98" width="110" height="1132" rx="10" fill="#F4F6F7"/>
  <rect x="40" y="98" width="1520" height="1132" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/>
  <text x="112" y="184" class="line-no">01</text><text x="188" y="184" class="code" xml:space="preserve">function automatic logic [3:0] make_byte_enable(</text><text x="112" y="232" class="line-no">02</text><text x="188" y="232" class="code" xml:space="preserve">    input logic [1:0]  addr_lsb,</text><text x="112" y="280" class="line-no">03</text><text x="188" y="280" class="code" xml:space="preserve">    input logic [1:0]  access_size_in</text><text x="112" y="328" class="line-no">04</text><text x="188" y="328" class="code" xml:space="preserve">);</text><text x="112" y="376" class="line-no">05</text><text x="188" y="376" class="code" xml:space="preserve">    logic [3:0] mask;</text><text x="112" y="424" class="line-no">06</text><text x="188" y="424" class="code" xml:space="preserve"></text><text x="112" y="472" class="line-no">07</text><text x="188" y="472" class="code" xml:space="preserve">    case (access_size_in)</text><text x="112" y="520" class="line-no">08</text><text x="188" y="520" class="code" xml:space="preserve">        2&#x27;d0: mask = 4&#x27;b0001 &lt;&lt; addr_lsb;  // 1 byte</text><text x="112" y="568" class="line-no">09</text><text x="188" y="568" class="code" xml:space="preserve">        2&#x27;d1: mask = 4&#x27;b0011 &lt;&lt; {addr_lsb[1], 1&#x27;b0}; // 2 bytes</text><text x="112" y="616" class="line-no">10</text><text x="188" y="616" class="code" xml:space="preserve">        default: mask = 4&#x27;b1111;            // 4 bytes</text><text x="112" y="664" class="line-no">11</text><text x="188" y="664" class="code" xml:space="preserve">    endcase</text><text x="112" y="712" class="line-no">12</text><text x="188" y="712" class="code" xml:space="preserve"></text><text x="112" y="760" class="line-no">13</text><text x="188" y="760" class="code" xml:space="preserve">    return mask;</text><text x="112" y="808" class="line-no">14</text><text x="188" y="808" class="code" xml:space="preserve">endfunction</text><text x="112" y="856" class="line-no">15</text><text x="188" y="856" class="code" xml:space="preserve"></text><text x="112" y="904" class="line-no">16</text><text x="188" y="904" class="code" xml:space="preserve">logic [31:0] addr;</text><text x="112" y="952" class="line-no">17</text><text x="188" y="952" class="code" xml:space="preserve">logic [1:0]  access_size;</text><text x="112" y="1000" class="line-no">18</text><text x="188" y="1000" class="code" xml:space="preserve">logic [3:0]  be;</text><text x="112" y="1048" class="line-no">19</text><text x="188" y="1048" class="code" xml:space="preserve"></text><text x="112" y="1096" class="line-no">20</text><text x="188" y="1096" class="code" xml:space="preserve">always_comb begin</text><text x="112" y="1144" class="line-no">21</text><text x="188" y="1144" class="code" xml:space="preserve">    be = make_byte_enable(addr[1:0], access_size);</text><text x="112" y="1192" class="line-no">22</text><text x="188" y="1192" class="code" xml:space="preserve">end</text>
</svg>
