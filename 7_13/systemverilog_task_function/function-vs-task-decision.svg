<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">SystemVerilog function 与 task 的选型决策图</title>
  <desc id="desc">先判断是否需要 time control；再判断是否需要 expression result 或多个输出。</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495E"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6FB5"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E67E22"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7B68EE"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#23313F" flood-opacity=".20"/>
    </filter>
    <style>
      .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 38px; font-weight: 700; fill: #23313F; }
      .subtitle { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 400; fill: #566573; }
      .question { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #FFFFFF; }
      .box-title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 25px; font-weight: 700; fill: #FFFFFF; }
      .box-note { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; font-weight: 400; fill: #FFFFFF; }
      .edge-label { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; font-weight: 700; }
      .footer { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-style: italic; fill: #23313F; }
    </style>
  </defs>
  <rect width="1200" height="860" fill="#FFFFFF"/>
  <text x="600" y="48" text-anchor="middle" class="title">function 还是 task？三步选型</text>
  <text x="600" y="79" text-anchor="middle" class="subtitle">先看 time semantics，再看 return shape</text>

  <g filter="url(#shadow)">
    <path d="M600 112 L805 180 L600 248 L395 180 Z" fill="#1F4E79" stroke="#163A5A" stroke-width="3"/>
    <rect x="870" y="140" width="260" height="82" rx="14" fill="#E67E22" stroke="#A84B00" stroke-width="3"/>
  </g>
  <text x="600" y="174" text-anchor="middle" class="question">Need # / @ / wait</text>
  <text x="600" y="202" text-anchor="middle" class="question">or handshake?</text>
  <text x="1000" y="172" text-anchor="middle" class="box-title">Use task</text>
  <text x="1000" y="198" text-anchor="middle" class="box-note">driver / BFM / reset / handshake</text>
  <path d="M806 180 H860" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="830" y="166" text-anchor="middle" class="edge-label" fill="#A84B00">Yes</text>

  <g filter="url(#shadow)">
    <path d="M600 325 L805 393 L600 461 L395 393 Z" fill="#1F4E79" stroke="#163A5A" stroke-width="3"/>
    <rect x="870" y="353" width="260" height="82" rx="14" fill="#1F6FB5" stroke="#164B7A" stroke-width="3"/>
  </g>
  <path d="M600 249 V315" stroke="#34495E" stroke-width="3" fill="none" marker-end="url(#arrow-dark)"/>
  <text x="620" y="287" class="edge-label" fill="#34495E">No</text>
  <text x="600" y="386" text-anchor="middle" class="question">Need a result directly</text>
  <text x="600" y="414" text-anchor="middle" class="question">inside an expression?</text>
  <text x="1000" y="385" text-anchor="middle" class="box-title">Use function</text>
  <text x="1000" y="411" text-anchor="middle" class="box-note">decode / CRC / parity / calculation</text>
  <path d="M806 393 H860" stroke="#1F6FB5" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="830" y="379" text-anchor="middle" class="edge-label" fill="#164B7A">Yes</text>

  <g filter="url(#shadow)">
    <path d="M600 538 L805 606 L600 674 L395 606 Z" fill="#1F4E79" stroke="#163A5A" stroke-width="3"/>
    <rect x="870" y="566" width="260" height="82" rx="14" fill="#E67E22" stroke="#A84B00" stroke-width="3"/>
    <rect x="70" y="566" width="260" height="82" rx="14" fill="#7B68EE" stroke="#4F3FA6" stroke-width="3"/>
  </g>
  <path d="M600 462 V528" stroke="#34495E" stroke-width="3" fill="none" marker-end="url(#arrow-dark)"/>
  <text x="620" y="500" class="edge-label" fill="#34495E">No</text>
  <text x="600" y="599" text-anchor="middle" class="question">Need procedure orchestration</text>
  <text x="600" y="627" text-anchor="middle" class="question">or multiple output values?</text>
  <text x="1000" y="598" text-anchor="middle" class="box-title">Use task</text>
  <text x="1000" y="624" text-anchor="middle" class="box-note">output / inout / ref parameters</text>
  <text x="200" y="598" text-anchor="middle" class="box-title">Use void function</text>
  <text x="200" y="624" text-anchor="middle" class="box-note">no return value, still zero-time</text>
  <path d="M806 606 H860" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="830" y="592" text-anchor="middle" class="edge-label" fill="#A84B00">Yes</text>
  <path d="M394 606 H340" stroke="#7B68EE" stroke-width="3" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="365" y="592" text-anchor="middle" class="edge-label" fill="#4F3FA6">No</text>

  <g filter="url(#shadow)">
    <rect x="215" y="755" width="770" height="60" rx="14" fill="#F4F6F7" stroke="#AAB7B8" stroke-width="2"/>
  </g>
  <text x="600" y="792" text-anchor="middle" class="footer">Rule of thumb: time semantics decide first; return shape decides second.</text>
</svg>
