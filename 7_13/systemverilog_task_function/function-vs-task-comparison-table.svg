<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="770" viewBox="0 0 1600 770" role="img" aria-labelledby="title desc">
  <title id="title">SystemVerilog function 与 task 的核心差异表</title>
  <desc id="desc">一张横向三列表格，对比 function 与 task 的时间控制、调用上下文、返回方式、典型用途和可重入性。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#23313F" flood-opacity=".16"/>
    </filter>
    <style>
      .title { font: 700 37px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #D6EAF8; }
      .header { font: 700 31px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; }
      .dimension { font: 700 27px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #23313F; }
      .cell { font: 400 27px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #34495E; }
      .code { font: 600 26px "DejaVu Sans Mono", Consolas, monospace; fill: #34495E; }
      .footer { font: italic 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #566573; }
    </style>
  </defs>
  <rect width="1600" height="770" fill="#FFFFFF"/>
  <rect width="1600" height="92" fill="#23313F"/>
  <text x="74" y="53" class="title">SystemVerilog：function 与 task 的核心差异</text>
  <text x="74" y="78" class="subtitle">先看 time control，再决定使用哪一种 procedure abstraction</text>

  <g filter="url(#shadow)">
    <rect x="40" y="124" width="1520" height="568" rx="14" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="2"/>
    <rect x="40" y="124" width="300" height="82" rx="14" fill="#34495E"/>
    <path d="M326 124 H340 V206 H326 Z" fill="#34495E"/>
    <rect x="340" y="124" width="610" height="82" fill="#1F6FB5"/>
    <rect x="950" y="124" width="610" height="82" rx="14" fill="#E67E22"/>
    <path d="M950 124 H964 V206 H950 Z" fill="#E67E22"/>
  </g>

  <rect x="40" y="206" width="1520" height="88" fill="#FFFFFF"/>
  <rect x="40" y="294" width="1520" height="88" fill="#F4F6F7"/>
  <rect x="40" y="382" width="1520" height="88" fill="#FFFFFF"/>
  <rect x="40" y="470" width="1520" height="110" fill="#F4F6F7"/>
  <rect x="40" y="580" width="1520" height="112" rx="14" fill="#FFFFFF"/>

  <rect x="340" y="206" width="8" height="486" fill="#1F6FB5" opacity=".65"/>
  <rect x="950" y="206" width="8" height="486" fill="#E67E22" opacity=".65"/>

  <path d="M340 124 V692 M950 124 V692 M40 206 H1560 M40 294 H1560 M40 382 H1560 M40 470 H1560 M40 580 H1560" stroke="#D5D8DC" stroke-width="2"/>

  <text x="190" y="176" text-anchor="middle" class="header">维度</text>
  <text x="645" y="176" text-anchor="middle" class="header">function</text>
  <text x="1255" y="176" text-anchor="middle" class="header">task</text>

  <text x="82" y="260" class="dimension">Time control</text>
  <text x="390" y="260" class="cell">不包含 <tspan class="code">#</tspan>、<tspan class="code">@</tspan>、<tspan class="code">wait</tspan></text>
  <text x="1000" y="260" class="cell">可包含 <tspan class="code">#</tspan>、<tspan class="code">@</tspan>、<tspan class="code">wait</tspan></text>

  <text x="82" y="348" class="dimension">调用上下文</text>
  <text x="390" y="348" class="code">expression / assertion</text>
  <text x="1000" y="348" class="code">procedural statement</text>

  <text x="82" y="436" class="dimension">返回方式</text>
  <text x="390" y="436" class="cell">return value 或 <tspan class="code">void</tspan></text>
  <text x="1000" y="436" class="cell"><tspan class="code">output</tspan> / <tspan class="code">inout</tspan> / <tspan class="code">ref</tspan> 参数</text>

  <text x="82" y="526" class="dimension">典型用途</text>
  <text x="390" y="526" class="cell">decode、CRC、parity、scoreboard 计算</text>
  <text x="1000" y="526" class="cell">driver、BFM、reset、handshake</text>

  <text x="82" y="647" class="dimension">可重入性</text>
  <text x="390" y="647" class="cell">并发调用时优先 <tspan class="code">automatic</tspan></text>
  <text x="1000" y="647" class="cell">并发调用时优先 <tspan class="code">automatic</tspan></text>

  <text x="800" y="735" text-anchor="middle" class="footer">口诀：要等待，就用 task；要计算并立即拿结果，就用 function。</text>
</svg>
