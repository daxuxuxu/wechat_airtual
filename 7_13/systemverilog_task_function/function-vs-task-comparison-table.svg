<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">SystemVerilog function 与 task 的核心差异表</title>
  <desc id="desc">一张大字号横向三列表格，对比 function 与 task 的时间控制、调用上下文、返回方式、典型用途和可重入性。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#23313F" flood-opacity=".16"/>
    </filter>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #FFFFFF; }
      .subtitle { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-weight: 400; fill: #D6EAF8; }
      .header { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 41px; font-weight: 700; fill: #FFFFFF; }
      .dimension { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 36px; font-weight: 700; fill: #23313F; }
      .cell { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 36px; font-weight: 400; fill: #34495E; }
      .code { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 34px; font-weight: 600; fill: #34495E; }
      .footer { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-style: italic; fill: #566573; }
    </style>
  </defs>
  <rect width="1600" height="860" fill="#FFFFFF"/>
  <rect width="1600" height="94" fill="#23313F"/>
  <text x="70" y="55" class="title">SystemVerilog：function 与 task 的核心差异</text>
  <text x="70" y="81" class="subtitle">先看 time control，再决定使用哪一种 procedure abstraction</text>

  <g filter="url(#shadow)">
    <rect x="30" y="122" width="1540" height="690" rx="16" fill="#FFFFFF" stroke="#D5D8DC" stroke-width="2"/>
    <rect x="30" y="122" width="330" height="90" rx="16" fill="#34495E"/>
    <path d="M344 122 H360 V212 H344 Z" fill="#34495E"/>
    <rect x="360" y="122" width="605" height="90" fill="#1F6FB5"/>
    <rect x="965" y="122" width="605" height="90" rx="16" fill="#E67E22"/>
    <path d="M965 122 H981 V212 H965 Z" fill="#E67E22"/>
  </g>

  <rect x="30" y="212" width="1540" height="120" fill="#FFFFFF"/>
  <rect x="30" y="332" width="1540" height="120" fill="#F4F6F7"/>
  <rect x="30" y="452" width="1540" height="120" fill="#FFFFFF"/>
  <rect x="30" y="572" width="1540" height="120" fill="#F4F6F7"/>
  <rect x="30" y="692" width="1540" height="120" rx="16" fill="#FFFFFF"/>

  <rect x="360" y="212" width="9" height="600" fill="#1F6FB5" opacity=".70"/>
  <rect x="965" y="212" width="9" height="600" fill="#E67E22" opacity=".70"/>
  <path d="M360 122 V812 M965 122 V812 M30 212 H1570 M30 332 H1570 M30 452 H1570 M30 572 H1570 M30 692 H1570" stroke="#D5D8DC" stroke-width="2"/>

  <text x="195" y="178" text-anchor="middle" class="header">维度</text>
  <text x="662" y="178" text-anchor="middle" class="header">function</text>
  <text x="1267" y="178" text-anchor="middle" class="header">task</text>

  <text x="76" y="285" class="dimension">Time control</text>
  <text x="410" y="285" class="cell">不包含 <tspan class="code">#</tspan>、<tspan class="code">@</tspan>、<tspan class="code">wait</tspan></text>
  <text x="1015" y="285" class="cell">可包含 <tspan class="code">#</tspan>、<tspan class="code">@</tspan>、<tspan class="code">wait</tspan></text>

  <text x="76" y="405" class="dimension">调用上下文</text>
  <text x="410" y="405" class="code">expression / assertion</text>
  <text x="1015" y="405" class="code">procedural statement</text>

  <text x="76" y="525" class="dimension">返回方式</text>
  <text x="410" y="525" class="cell">return value 或 <tspan class="code">void</tspan></text>
  <text x="1015" y="525" class="cell"><tspan class="code">output</tspan> / <tspan class="code">inout</tspan> / <tspan class="code">ref</tspan> 参数</text>

  <text x="76" y="645" class="dimension">典型用途</text>
  <text x="410" y="645" class="cell">decode、CRC、parity、scoreboard 计算</text>
  <text x="1015" y="645" class="cell">driver、BFM、reset、handshake</text>

  <text x="76" y="765" class="dimension">可重入性</text>
  <text x="410" y="765" class="cell">并发调用时优先 <tspan class="code">automatic</tspan></text>
  <text x="1015" y="765" class="cell">并发调用时优先 <tspan class="code">automatic</tspan></text>

  <text x="800" y="842" text-anchor="middle" class="footer">口诀：要等待，就用 task；要计算并立即拿结果，就用 function。</text>
</svg>
