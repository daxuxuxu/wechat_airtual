<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="358" viewBox="0 0 1600 358" role="img" aria-label="task expression 错误示例">
  <style>
    .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 38px; font-weight: 700; fill: #FFFFFF; }
    .status { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 27px; font-weight: 700; fill: #FFFFFF; }
    .line-no { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 28px; font-weight: 400; fill: #7F8C8D; }
    .code { font-family: "DejaVu Sans Mono", Consolas, monospace; font-size: 35px; font-weight: 400; fill: #23313F; }
  </style>
  <rect width="1600" height="358" fill="#FFFFFF"/>
  <rect width="1600" height="80" fill="#C0392B"/>
  <text x="54" y="51" class="title">task expression 错误示例</text>
  <rect x="1240" y="19" width="310" height="42" rx="21" fill="#23313F" opacity=".94"/>
  <text x="1395" y="48" text-anchor="middle" class="status">ILLEGAL / 不应使用</text>
  <rect x="40" y="98" width="110" height="220" rx="10" fill="#F4F6F7"/>
  <rect x="40" y="98" width="1520" height="220" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/>
  <text x="112" y="184" class="line-no">01</text><text x="188" y="184" class="code" xml:space="preserve">if (send_write(addr, data, resp)) begin</text><text x="112" y="232" class="line-no">02</text><text x="188" y="232" class="code" xml:space="preserve">    // illegal: a task does not produce an expression result</text><text x="112" y="280" class="line-no">03</text><text x="188" y="280" class="code" xml:space="preserve">end</text>
