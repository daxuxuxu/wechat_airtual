  </style>
  <rect width="1600" height="934" fill="#FFFFFF"/>
  <rect width="1600" height="80" fill="#1F6FB5"/>
  <text x="54" y="51" class="title">task 多输出示例</text>
  <rect x="1240" y="19" width="310" height="42" rx="21" fill="#23313F" opacity=".94"/>
  <text x="1395" y="48" text-anchor="middle" class="status">SystemVerilog</text>
  <rect x="40" y="98" width="110" height="796" rx="10" fill="#F4F6F7"/>
  <rect x="40" y="98" width="1520" height="796" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/>
  <text x="112" y="184" class="line-no">01</text><text x="188" y="184" class="code" xml:space="preserve">task automatic split_addr(</text><text x="112" y="232" class="line-no">02</text><text x="188" y="232" class="code" xml:space="preserve">    input  logic [31:0] addr,</text><text x="112" y="280" class="line-no">03</text><text x="188" y="280" class="code" xml:space="preserve">    output logic [15:0] page,</text><text x="112" y="328" class="line-no">04</text><text x="188" y="328" class="code" xml:space="preserve">    output logic [11:0] offset</text><text x="112" y="376" class="line-no">05</text><text x="188" y="376" class="code" xml:space="preserve">);</text><text x="112" y="424" class="line-no">06</text><text x="188" y="424" class="code" xml:space="preserve">    page   = addr[27:12];</text><text x="112" y="472" class="line-no">07</text><text x="188" y="472" class="code" xml:space="preserve">    offset = addr[11:0];</text><text x="112" y="520" class="line-no">08</text><text x="188" y="520" class="code" xml:space="preserve">endtask</text><text x="112" y="568" class="line-no">09</text><text x="188" y="568" class="code" xml:space="preserve"></text><text x="112" y="616" class="line-no">10</text><text x="188" y="616" class="code" xml:space="preserve">logic [15:0] page;</text><text x="112" y="664" class="line-no">11</text><text x="188" y="664" class="code" xml:space="preserve">logic [11:0] offset;</text><text x="112" y="712" class="line-no">12</text><text x="188" y="712" class="code" xml:space="preserve"></text><text x="112" y="760" class="line-no">13</text><text x="188" y="760" class="code" xml:space="preserve">initial begin</text><text x="112" y="808" class="line-no">14</text><text x="188" y="808" class="code" xml:space="preserve">    split_addr(32&#x27;h8123_4ABC, page, offset);</text><text x="112" y="856" class="line-no">15</text><text x="188" y="856" class="code" xml:space="preserve">end</text>
</svg>
