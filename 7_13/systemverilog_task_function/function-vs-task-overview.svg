<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">SystemVerilog function 与 task 的仿真时间差异</title>
  <desc id="desc">function 在同一仿真时刻完成计算；task 可以跨多个时钟周期执行并等待握手。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6FB5"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E67E22"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#23313F"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#23313F" flood-opacity=".20"/>
    </filter>
    <style>
      .title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 38px; font-weight: 700; fill: #23313F; }
      .subtitle { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 400; fill: #566573; }
      .lane-title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 29px; font-weight: 700; fill: #FFFFFF; }
      .hint { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; font-style: italic; }
      .box-title { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 24px; font-weight: 700; }
      .box-note { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 18px; font-weight: 400; }
      .axis { font-family: Arial, "Noto Sans CJK SC", sans-serif; font-size: 20px; font-weight: 700; fill: #23313F; }
    </style>
  </defs>
  <rect width="1600" height="760" fill="#FFFFFF"/>
  <text x="800" y="45" text-anchor="middle" class="title">SystemVerilog：function 与 task，先看 simulation time</text>
  <text x="800" y="75" text-anchor="middle" class="subtitle">先判断是否需要 time control，再考虑 return value 的形状</text>

  <g filter="url(#shadow)">
    <rect x="40" y="108" width="1520" height="245" rx="12" fill="#FFFFFF" stroke="#1F6FB5" stroke-width="3"/>
    <path d="M52 108 H1548 A12 12 0 0 1 1560 120 V158 H40 V120 A12 12 0 0 1 52 108 Z" fill="#1F6FB5"/>
  </g>
  <text x="70" y="140" class="lane-title">function — zero-time computation</text>
  <text x="800" y="187" text-anchor="middle" class="hint" fill="#1F6FB5">所有动作发生在同一 simulation time slot；不等待 clock / event / delay</text>

  <g filter="url(#shadow)">
    <rect x="130" y="215" width="250" height="78" rx="12" fill="#D6EAF8" stroke="#1F6FB5" stroke-width="2.5"/>
    <rect x="675" y="215" width="260" height="78" rx="12" fill="#EBF5FB" stroke="#1F6FB5" stroke-width="2.5"/>
    <rect x="1220" y="215" width="250" height="78" rx="12" fill="#D5F5E3" stroke="#2E8B57" stroke-width="3"/>
  </g>
  <text x="255" y="247" text-anchor="middle" class="box-title" fill="#153E63">Input arguments</text>
  <text x="255" y="272" text-anchor="middle" class="box-note" fill="#153E63">data / addr / size</text>
  <text x="805" y="247" text-anchor="middle" class="box-title" fill="#153E63">Compute</text>
  <text x="805" y="272" text-anchor="middle" class="box-note" fill="#153E63">decode / CRC / parity</text>
  <text x="1345" y="247" text-anchor="middle" class="box-title" fill="#1D5D3A">return value</text>
  <text x="1345" y="272" text-anchor="middle" class="box-note" fill="#1D5D3A">expression result</text>
  <path d="M382 254 H670" stroke="#1F6FB5" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M937 254 H1215" stroke="#2E8B57" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M175 321 H1425" stroke="#23313F" stroke-width="2.5" fill="none" marker-end="url(#arrow-dark)"/>
  <text x="800" y="346" text-anchor="middle" class="axis">simulation time = T</text>

  <g filter="url(#shadow)">
    <rect x="40" y="400" width="1520" height="310" rx="12" fill="#FFFFFF" stroke="#E67E22" stroke-width="3"/>
    <path d="M52 400 H1548 A12 12 0 0 1 1560 412 V450 H40 V412 A12 12 0 0 1 52 400 Z" fill="#E67E22"/>
  </g>
  <text x="70" y="432" class="lane-title">task — time-consuming procedure</text>
  <text x="800" y="480" text-anchor="middle" class="hint" fill="#A64B00">可等待 clock、event、delay 与 valid-ready handshake；仿真时间会前进</text>

  <g filter="url(#shadow)">
    <rect x="110" y="510" width="185" height="75" rx="12" fill="#FDEBD0" stroke="#E67E22" stroke-width="2.5"/>
    <rect x="375" y="510" width="220" height="75" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="2.5"/>
    <rect x="675" y="510" width="190" height="75" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="2.5"/>
    <rect x="945" y="510" width="190" height="75" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="2.5"/>
    <rect x="1215" y="510" width="225" height="75" rx="12" fill="#D5F5E3" stroke="#2E8B57" stroke-width="3"/>
  </g>
  <text x="202" y="555" text-anchor="middle" class="box-title" fill="#7E3C00">Call</text>
  <text x="485" y="555" text-anchor="middle" class="box-title" fill="#7E3C00">@(posedge clk)</text>
  <text x="770" y="555" text-anchor="middle" class="box-title" fill="#7E3C00">drive valid</text>
  <text x="1040" y="555" text-anchor="middle" class="box-title" fill="#7E3C00">wait ready</text>
  <text x="1328" y="555" text-anchor="middle" class="box-title" fill="#1D5D3A">output response</text>
  <path d="M297 548 H367" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M597 548 H667" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M867 548 H937" stroke="#E67E22" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M1137 548 H1207" stroke="#2E8B57" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M140 650 H1430" stroke="#23313F" stroke-width="2.5" fill="none" marker-end="url(#arrow-dark)"/>
  <text x="172" y="683" text-anchor="middle" class="axis">T</text>
  <text x="485" y="683" text-anchor="middle" class="axis">T+1</text>
  <text x="770" y="683" text-anchor="middle" class="axis">T+2</text>
  <text x="1328" y="683" text-anchor="middle" class="axis">T+N</text>
</svg>
