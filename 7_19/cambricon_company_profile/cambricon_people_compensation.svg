<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">寒武纪 2025 年人才与薪酬观察</title>
  <desc id="desc">年末在职员工 1107 人，研发团队 887 人，研发人员占比 80.13%，员工持股 650 人占 58.72%，支付给职工及为职工支付的现金 7.33 亿元，按期末人数粗略估算人均约 66.3 万元。</desc>
  <rect width="1440" height="960" fill="#F7FAFF"/>
  <rect x="60" y="54" width="1320" height="852" rx="38" fill="#FFF"/>
  <rect x="60" y="54" width="16" height="852" rx="8" fill="#1463FF"/>
  <text x="126" y="148" fill="#15233D" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="52" font-weight="700">寒武纪 2025 年：人才与薪酬观察</text>
  <text x="128" y="202" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="27">年报公开数据与现金流口径估算｜不等同于人均税前年薪</text>
  <rect x="128" y="276" width="330" height="260" rx="28" fill="#EEF5FF"/>
  <text x="170" y="350" fill="#1463FF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="64" font-weight="700">1,107</text>
  <text x="170" y="400" fill="#334155" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="29">年末在职员工（人）</text>
  <text x="170" y="460" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="23">母公司及主要子公司合计</text>
  <rect x="505" y="276" width="330" height="260" rx="28" fill="#EAFBF2"/>
  <text x="547" y="350" fill="#15803D" font-family="Arial, Microsoft YaHei, sans-serif" font-size="64" font-weight="700">887</text>
  <text x="547" y="400" fill="#334155" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="29">研发人员（人）</text>
  <text x="547" y="460" fill="#15803D" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">占员工总数 80.13%</text>
  <rect x="882" y="276" width="370" height="260" rx="28" fill="#FFF6E8"/>
  <text x="924" y="350" fill="#9A5A00" font-family="Arial, Microsoft YaHei, sans-serif" font-size="64" font-weight="700">650</text>
  <text x="924" y="400" fill="#334155" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="29">员工持股人数（人）</text>
  <text x="924" y="460" fill="#9A5A00" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">占员工总数 58.72%</text>
  <rect x="128" y="598" width="1124" height="170" rx="30" fill="#142A52"/>
  <text x="180" y="666" fill="#C9DCFF" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28">“支付给职工及为职工支付的现金”</text>
  <text x="180" y="728" fill="#FFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="53" font-weight="700">7.33 亿元</text>
  <line x1="696" y1="632" x2="696" y2="736" stroke="#476A9E" stroke-width="2"/>
  <text x="748" y="666" fill="#C9DCFF" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28">按期末人数粗略估算</text>
  <text x="748" y="728" fill="#8BE0BF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="53" font-weight="700">约 66.3 万元/人</text>
  <text x="128" y="855" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22">注：现金流项目可能包含工资、奖金、社保、公积金及福利等；期末人数不等于全年平均人数。</text>
</svg>
