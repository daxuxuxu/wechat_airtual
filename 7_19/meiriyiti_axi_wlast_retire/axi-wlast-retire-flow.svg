<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">AXI write：WLAST 不是 retire 点</text><rect x="120" y="280" width="270" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="255" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#0B6B57">AW handshake</text><rect x="510" y="280" width="270" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="645" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#0B6B57">W beats</text><rect x="900" y="280" width="270" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1035" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#A84B00">WLAST accepted</text><text x="1035" y="375" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#A84B00">data complete</text><rect x="1290" y="280" width="210" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1395" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#1D5D3A">B handshake</text><text x="1395" y="375" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#1D5D3A">retire</text><path d="M390 340 H500 M780 340 H890 M1170 340 H1280" stroke="#34495E" stroke-width="5"/><text x="800" y="580" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">WLAST 说明 write data burst 已接收；BRESP 才说明 write transaction 已完成。</text></svg>