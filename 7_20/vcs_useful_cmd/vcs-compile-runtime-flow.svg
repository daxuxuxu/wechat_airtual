<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720"><rect width="1600" height="720" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">VCS：compile option 与 runtime option 的分界</text><rect x="150" y="270" width="330" height="130" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="315" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">vcs compile</text><text x="315" y="375" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="26" fill="#0B6B57">-f +incdir+ +define+</text><rect x="635" y="270" width="330" height="130" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">simv image</text><rect x="1120" y="270" width="330" height="130" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1285" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">runtime</text><text x="1285" y="375" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="26" fill="#1D5D3A">+UVM_TESTNAME +seed</text><path d="M480 335 H625 M965 335 H1110" stroke="#34495E" stroke-width="5"/><text x="800" y="560" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">compile option 决定 image 中有什么；runtime option 决定本次 simulation 如何运行。</text></svg>