<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800"><rect width="1600" height="800" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">VCS option 按目的分类</text><rect x="100" y="170" width="650" height="190" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="150" y="240" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">编译与文件组织</text><text x="150" y="300" font-family="DejaVu Sans Mono" font-size="29" fill="#23313F">-sverilog   -f   +incdir+   +define+</text><rect x="850" y="170" width="650" height="190" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="900" y="240" font-family="Noto Sans CJK,Arial" font-size="36" font-weight="700" fill="#A84B00">Debug 与 log</text><text x="900" y="300" font-family="DejaVu Sans Mono" font-size="29" fill="#23313F">-debug_access   -l   +UVM_VERBOSITY</text><rect x="100" y="440" width="650" height="190" rx="18" fill="#EBF5FB" stroke="#2E86C1" stroke-width="3"/><text x="150" y="510" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1B4F72">Coverage</text><text x="150" y="570" font-family="DejaVu Sans Mono" font-size="29" fill="#23313F">-cm   -cm_name   -cm_dir</text><rect x="850" y="440" width="650" height="190" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="900" y="510" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">Test 与随机</text><text x="900" y="570" font-family="DejaVu Sans Mono" font-size="29" fill="#23313F">+UVM_TESTNAME   +ntb_random_seed</text></svg>