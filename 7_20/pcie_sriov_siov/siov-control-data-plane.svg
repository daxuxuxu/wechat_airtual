<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">SIOV：control plane 与 data plane 分工</text><rect x="130" y="200" width="560" height="340" rx="20" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="180" y="270" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">Control plane</text><text x="180" y="340" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">software 创建 / 分配 interface</text><text x="180" y="400" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">配置 mapping / permission</text><text x="180" y="460" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">管理 lifecycle</text><rect x="910" y="200" width="560" height="340" rx="20" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="960" y="270" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">Data plane</text><text x="960" y="340" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">device 选择 context</text><text x="960" y="400" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">route request / interrupt</text><text x="960" y="460" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">隔离 resource state</text><path d="M690 370 H900" stroke="#34495E" stroke-width="5"/><text x="800" y="650" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">software 管理“谁能用”，device 负责“请求进入后走到谁”。</text></svg>