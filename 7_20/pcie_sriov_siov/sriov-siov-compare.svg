<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780"><rect width="1600" height="780" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">SR-IOV 与 SIOV：核心差异</text><rect x="80" y="150" width="1440" height="480" rx="18" fill="#F4F6F7" stroke="#D5D8DC" stroke-width="2"/><rect x="80" y="150" width="400" height="80" fill="#0B6B57"/><rect x="480" y="150" width="480" height="80" fill="#159477"/><rect x="960" y="150" width="560" height="80" fill="#7B68EE"/><text x="280" y="203" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">维度</text><text x="720" y="203" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">SR-IOV</text><text x="1240" y="203" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">SIOV</text><path d="M480 150 V630 M960 150 V630 M80 230 H1520 M80 350 H1520 M80 470 H1520" stroke="#D5D8DC" stroke-width="2"/><text x="120" y="300" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">虚拟接口</text><text x="520" y="300" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">VF，独立 PCIe Function</text><text x="1000" y="300" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">SDI，轻量级接口</text><text x="120" y="420" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">硬件状态</text><text x="520" y="420" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">每 VF 有较完整配置资源</text><text x="1000" y="420" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">减少 per-interface 硬件状态</text><text x="120" y="540" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">适用目标</text><text x="520" y="540" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">成熟虚拟化生态</text><text x="1000" y="540" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">更大规模可扩展虚拟化</text></svg>