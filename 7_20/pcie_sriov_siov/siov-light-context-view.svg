<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">再看 SIOV：多个轻量 interface 共用硬件引擎</text><rect x="100" y="180" width="480" height="370" rx="20" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="340" y="245" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">Physical Device</text><rect x="190" y="320" width="300" height="120" rx="16" fill="#FFFFFF" stroke="#159477" stroke-width="3"/><text x="340" y="390" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">shared data engine</text><rect x="760" y="260" width="180" height="100" rx="16" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="850" y="320" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" font-weight="700" fill="#5B4BB7">SDI 0</text><path d="M580 380 H750" stroke="#34495E" stroke-width="4"/><rect x="1000" y="260" width="180" height="100" rx="16" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="1090" y="320" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" font-weight="700" fill="#5B4BB7">SDI 1</text><path d="M580 380 H990" stroke="#34495E" stroke-width="4"/><rect x="1240" y="260" width="180" height="100" rx="16" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="1330" y="320" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" font-weight="700" fill="#5B4BB7">SDI 2</text><path d="M580 380 H1230" stroke="#34495E" stroke-width="4"/><text x="800" y="650" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">SDI 更像“带 identity 的使用 context”，不必每个都复制完整传统 Function 外壳。</text></svg>