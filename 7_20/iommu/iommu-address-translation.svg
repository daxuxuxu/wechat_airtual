<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">IOMMU：把 device address 翻译成允许访问的 memory</text><rect x="100" y="280" width="280" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="240" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">PCIe Device</text><rect x="660" y="280" width="280" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">IOMMU</text><text x="800" y="375" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#A84B00">IOVA → PA</text><rect x="1220" y="280" width="280" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1360" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">System Memory</text><path d="M380 340 H650 M940 340 H1210" stroke="#34495E" stroke-width="5"/><text x="800" y="570" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">translation hit 才允许 DMA 到目标 memory；mapping 缺失或权限不符则产生 fault。</text></svg>