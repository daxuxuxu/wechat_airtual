<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">IOMMU fault 与 invalidation 生命周期</text><rect x="100" y="280" width="260" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="230" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">DMA request</text><rect x="500" y="280" width="260" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="630" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">mapping lookup</text><rect x="900" y="280" width="260" height="120" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="1030" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A93226">fault / invalidate</text><rect x="1300" y="280" width="200" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1400" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1D5D3A">retry</text><path d="M360 340 H490 M760 340 H890 M1160 340 H1290" stroke="#34495E" stroke-width="5"/><text x="800" y="610" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">invalidation 后旧 translation 不可继续使用；retry 必须使用当前 context 的新 mapping。</text></svg>