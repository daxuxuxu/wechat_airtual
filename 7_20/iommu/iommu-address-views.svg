<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">同一块 memory，在不同视角下有不同地址</text><rect x="110" y="230" width="360" height="230" rx="20" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="290" y="300" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">CPU / Process</text><text x="160" y="375" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">virtual address</text><rect x="620" y="230" width="360" height="230" rx="20" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="300" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">PCIe Device</text><text x="670" y="375" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">IOVA / DMA address</text><rect x="1130" y="230" width="360" height="230" rx="20" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1310" y="300" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1D5D3A">Memory</text><text x="1180" y="375" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">physical address</text><path d="M470 345 H610 M980 345 H1120" stroke="#34495E" stroke-width="5"/><text x="800" y="620" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">IOMMU 负责把 device 看到的 IOVA 翻译到允许访问的 physical page。</text></svg>