<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">IOMMU isolation：相同 IOVA，不同 context</text><rect x="150" y="210" width="500" height="300" rx="20" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="200" y="280" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">Context A</text><text x="200" y="350" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">IOVA X → Physical Page A</text><rect x="950" y="210" width="500" height="300" rx="20" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="1000" y="280" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">Context B</text><text x="1000" y="350" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">IOVA X → Physical Page B</text><text x="800" y="650" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#34495E">address 相同不代表资源相同；context identity 决定最终 mapping。</text></svg>