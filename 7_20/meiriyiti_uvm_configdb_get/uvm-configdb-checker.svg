<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
<rect width="1600" height="1120" fill="#FFFFFF"/>
<rect width="1600" height="80" fill="#159477"/>
<text x="54" y="51" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">Code Demo：test set → agent get 的完整配置链</text>
<rect x="40" y="98" width="110" height="960" rx="10" fill="#F4F6F7"/>
<rect x="40" y="98" width="1520" height="960" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/>
<text x="112" y="160" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">01</text><text x="188" y="160" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">class config_demo_test extends uvm_test;</text>
<text x="112" y="210" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">02</text><text x="188" y="210" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  virtual demo_if vif;</text>
<text x="112" y="260" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">03</text><text x="188" y="260" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  function void build_phase(uvm_phase phase);</text>
<text x="112" y="310" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">04</text><text x="188" y="310" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    super.build_phase(phase);</text>
<text x="112" y="360" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">05</text><text x="188" y="360" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    uvm_config_db#(virtual demo_if)::set(</text>
<text x="112" y="410" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">06</text><text x="188" y="410" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">      this, "env.agent", "vif", vif);</text>
<text x="112" y="480" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">07</text><text x="188" y="480" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  endfunction</text>
<text x="112" y="550" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">08</text><text x="188" y="550" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">endclass</text>
<text x="112" y="640" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">09</text><text x="188" y="640" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">class demo_agent extends uvm_agent;</text>
<text x="112" y="690" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">10</text><text x="188" y="690" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  virtual demo_if vif;</text>
<text x="112" y="740" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">11</text><text x="188" y="740" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  function void build_phase(uvm_phase phase);</text>
<text x="112" y="790" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">12</text><text x="188" y="790" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    super.build_phase(phase);</text>
<text x="112" y="840" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">13</text><text x="188" y="840" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    if (!uvm_config_db#(virtual demo_if)::get(</text>
<text x="112" y="890" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">14</text><text x="188" y="890" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">        this, "", "vif", vif))</text>
<text x="112" y="940" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8D8D">15</text><text x="188" y="940" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">      `uvm_fatal("NOVIF", "virtual interface not set")</text>
<text x="112" y="990" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">16</text><text x="188" y="990" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  endfunction</text>
<text x="112" y="1040" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">17</text><text x="188" y="1040" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">endclass</text>
</svg>
