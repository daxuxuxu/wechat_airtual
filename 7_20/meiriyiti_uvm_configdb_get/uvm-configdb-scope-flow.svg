<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720"><rect width="1600" height="720" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">config_db：set 与 get 必须在同一条 scope 逻辑上相遇</text><rect x="120" y="270" width="300" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="270" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">test / env</text><rect x="650" y="270" width="300" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">config_db::set</text><rect x="1180" y="270" width="300" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1330" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">child get</text><path d="M420 330 H640 M950 330 H1170" stroke="#34495E" stroke-width="5"/><text x="800" y="560" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">scope、field name、type 和 set timing 有一项不匹配，get 就可能失败。</text></svg>