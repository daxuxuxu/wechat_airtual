<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">CHI：谁请求，谁维护一致性，谁提供 memory</text><rect x="100" y="270" width="300" height="140" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="250" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">Request Node</text><rect x="650" y="270" width="300" height="140" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">Home Node</text><rect x="1200" y="270" width="300" height="140" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1350" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">Subordinate Node</text><path d="M400 340 H640 M950 340 H1190" stroke="#34495E" stroke-width="5"/><text x="800" y="570" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Home Node 负责 ordering、snoop 与 coherency state；Subordinate Node 提供 memory 或 peripheral service。</text></svg>