<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">CHI Node 类型：谁有 cache，谁管理目录，谁提供 memory</text><rect x="100" y="170" width="650" height="230" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="150" y="235" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">Request Node</text><text x="150" y="300" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">RN-F：coherent cache</text><text x="150" y="350" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">RN-I / RN-D：I/O / DMA 类请求者</text><rect x="850" y="170" width="650" height="230" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="900" y="235" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">Home / Subordinate</text><text x="900" y="300" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">HN-F：directory / snoop control</text><text x="900" y="350" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">SN-F：memory service</text><rect x="470" y="520" width="660" height="100" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="800" y="582" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#5B4BB7">MN：全局一致性与系统级协调</text></svg>