<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">CHI coherent read：一笔 request 如何跨四类通道完成</text><rect x="90" y="210" width="270" height="110" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="225" y="278" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">REQ</text><text x="225" y="308" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="22" fill="#0B6B57">RN → HN</text><rect x="475" y="210" width="270" height="110" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="610" y="278" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#5B4BB7">SNP</text><text x="610" y="308" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="22" fill="#5B4BB7">HN → other RN</text><rect x="860" y="210" width="270" height="110" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="995" y="278" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">DAT</text><text x="995" y="308" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="22" fill="#A84B00">data return</text><rect x="1245" y="210" width="270" height="110" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1380" y="278" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1D5D3A">RSP</text><text x="1380" y="308" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="22" fill="#1D5D3A">completion / ack</text><path d="M360 265 H465 M745 265 H850 M1130 265 H1235" stroke="#34495E" stroke-width="5"/><text x="800" y="480" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">TxnID、SrcID、TgtID、DBID 等 identity 用于关联 request、snoop、data 和 response。</text><text x="800" y="560" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">HN 可根据 directory / snoop filter 决定是否 snoop，以及数据来自 memory 还是其他 cache。</text><text x="800" y="650" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">retry / credit / CompAck 等机制保证高并发下的资源管理与完成语义。</text></svg>