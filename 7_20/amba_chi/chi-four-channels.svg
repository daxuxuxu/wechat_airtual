<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780"><rect width="1600" height="780" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">CHI 四类通道：不只是 request / response</text><rect x="100" y="170" width="650" height="190" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="150" y="240" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">REQ / RSP</text><text x="150" y="305" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">request、completion、retry、credit-like flow</text><rect x="850" y="170" width="650" height="190" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="900" y="240" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">SNP</text><text x="900" y="305" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">coherency snoop request</text><rect x="100" y="450" width="1400" height="150" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="150" y="515" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">DAT</text><text x="150" y="565" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">read data、write data、snoop data 与 data response 的传输路径</text></svg>