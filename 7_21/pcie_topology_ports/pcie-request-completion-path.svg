<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">Request 向下走，Completion 向上回：同一 topology 的双向路径</text><rect x="120" y="260" width="280" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="260" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">Root Complex</text><rect x="660" y="260" width="280" height="120" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="800" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#5B4BB7">Switch</text><rect x="1200" y="260" width="280" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1340" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">Endpoint</text><path d="M400 290 H650 M940 290 H1190" stroke="#159477" stroke-width="6"/><text x="800" y="245" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" font-weight="700" fill="#0B6B57">MRd / MWr / Cfg Request</text><path d="M1190 370 H950 M650 370 H410" stroke="#E67E22" stroke-width="6"/><text x="800" y="450" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" font-weight="700" fill="#A84B00">Completion / Completion with Data</text><text x="800" y="620" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Upstream / Downstream 描述 hierarchy；ingress / egress 描述每个 port 当前收发的方向。</text></svg>