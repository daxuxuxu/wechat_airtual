<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780"><rect width="1600" height="780" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">一条典型 PCIe 路径：从 Root Complex 到 Endpoint</text><rect x="100" y="280" width="260" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="230" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">Root Complex</text><rect x="510" y="280" width="260" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="640" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">Root Port</text><rect x="920" y="230" width="260" height="220" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="1050" y="285" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#5B4BB7">Switch</text><text x="1050" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#5B4BB7">Upstream Port</text><text x="1050" y="405" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#5B4BB7">Downstream Port</text><rect x="1330" y="280" width="200" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1430" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1D5D3A">Endpoint</text><path d="M360 340 H500 M770 340 H910 M1180 340 H1320" stroke="#34495E" stroke-width="5"/><text x="800" y="620" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Root Complex 是系统入口；Switch 扩展路径；Endpoint 是最终 device。</text></svg>