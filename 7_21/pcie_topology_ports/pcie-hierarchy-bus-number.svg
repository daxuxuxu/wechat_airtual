<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">PCIe hierarchy：Bus Number 让 Configuration Request 找到方向</text><rect x="110" y="250" width="300" height="140" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="260" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">Root Port</text><text x="260" y="365" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#0B6B57">Primary Bus</text><rect x="650" y="220" width="300" height="200" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="295" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">Switch / Bridge</text><text x="800" y="345" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#A84B00">Secondary / Subordinate Bus</text><rect x="1190" y="250" width="300" height="140" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1340" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">Endpoint</text><text x="1340" y="365" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#1D5D3A">Target BDF</text><path d="M410 320 H640 M950 320 H1180" stroke="#34495E" stroke-width="5"/><text x="800" y="600" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Bridge 用 bus number 范围判断 Configuration Request 是否应转发到下游。</text></svg>