<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">Ingress / Egress：站在当前 port 的视角看方向</text><rect x="610" y="220" width="380" height="210" rx="20" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="800" y="285" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">当前 Switch Port</text><text x="800" y="345" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#5B4BB7">看“进入”还是“离开”</text><path d="M150 325 H600" stroke="#159477" stroke-width="6"/><path d="M140 312 L170 325 L140 338 Z" fill="#159477"/><text x="340" y="280" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">Ingress</text><text x="340" y="370" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">TLP 进入当前 port</text><path d="M1000 325 H1450" stroke="#E67E22" stroke-width="6"/><path d="M1440 312 L1470 325 L1440 338 Z" fill="#E67E22"/><text x="1230" y="280" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">Egress</text><text x="1230" y="370" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">TLP 离开当前 port</text><text x="800" y="590" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Upstream / Downstream 描述 topology 方向；Ingress / Egress 描述本 port 的收发方向。</text></svg>