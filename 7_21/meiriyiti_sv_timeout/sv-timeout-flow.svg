<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720"><rect width="1600" height="720" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">timeout：正常等待与计时器同时启动</text><rect x="140" y="260" width="320" height="130" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="300" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">wait response</text><rect x="620" y="260" width="320" height="130" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="780" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">timeout timer</text><rect x="1100" y="260" width="320" height="130" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="1260" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#5B4BB7">join_any</text><path d="M460 325 H610 M940 325 H1090" stroke="#34495E" stroke-width="5"/><text x="800" y="550" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">任一 thread 完成后，另一个 thread 仍在运行；disable fork 负责清理它。</text></svg>