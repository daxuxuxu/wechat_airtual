<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720"><rect width="1600" height="720" fill="#FFFFFF"/><rect width="1600" height="80" fill="#159477"/><text x="54" y="51" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">Code Demo：真实 SystemVerilog timeout pattern</text><rect x="40" y="98" width="110" height="560" rx="10" fill="#F4F6F7"/><rect x="40" y="98" width="1520" height="560" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/><text x="112" y="170" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">01</text><text x="188" y="170" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">task automatic wait_response_with_timeout();</text><text x="112" y="220" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">02</text><text x="188" y="220" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  bit response_seen = 0;</text><text x="112" y="270" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">03</text><text x="188" y="270" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  fork</text><text x="112" y="320" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">04</text><text x="188" y="320" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    begin wait (response_valid); response_seen = 1; end</text><text x="112" y="370" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">05</text><text x="188" y="370" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">    begin #timeout_cycles; end</text><text x="112" y="420" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">06</text><text x="188" y="420" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  join_any</text><text x="112" y="470" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">07</text><text x="188" y="470" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  disable fork;</text><text x="112" y="520" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">08</text><text x="188" y="520" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">  if (!response_seen) `uvm_error("TIMEOUT", "response missing")</text><text x="112" y="570" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">09</text><text x="188" y="570" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">endtask</text></svg>