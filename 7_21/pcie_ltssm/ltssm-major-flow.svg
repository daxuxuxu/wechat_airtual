<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">LTSSM：先确认对方，再开始传数据</text><rect x="90" y="280" width="240" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="210" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">Detect</text><rect x="440" y="280" width="240" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="560" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">Polling</text><rect x="790" y="280" width="300" height="120" rx="18" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="940" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#5B4BB7">Configuration</text><rect x="1200" y="280" width="240" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1320" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1D5D3A">L0</text><path d="M330 340 H430 M680 340 H780 M1090 340 H1190" stroke="#34495E" stroke-width="5"/><text x="800" y="570" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">Detect 像“有没有人在线”，Polling 像“能不能听懂彼此”，Configuration 像“确认用几条 lane 工作”。</text></svg>