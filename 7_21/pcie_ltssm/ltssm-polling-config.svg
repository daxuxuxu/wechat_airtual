<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800"><rect width="1600" height="800" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">Polling 与 Configuration：Link Training 真正在做什么</text><rect x="120" y="190" width="620" height="350" rx="20" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="170" y="255" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">Polling</text><text x="170" y="325" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">发送 / 接收 TS1、TS2</text><text x="170" y="385" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">确认对端存在</text><text x="170" y="445" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">确认基础训练条件</text><rect x="860" y="190" width="620" height="350" rx="20" fill="#F4F0FF" stroke="#7B68EE" stroke-width="3"/><text x="910" y="255" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#5B4BB7">Configuration</text><text x="910" y="325" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">分配 Link / Lane Number</text><text x="910" y="385" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">确定 active lane</text><text x="910" y="445" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">准备进入 L0</text><text x="800" y="670" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">TS1 / TS2 不是业务数据，而是两端在正式传 TLP 前交换的训练语言。</text></svg>