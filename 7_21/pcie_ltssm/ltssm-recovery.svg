<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">Recovery：Link 已经工作，为什么还会重新训练</text><rect x="150" y="260" width="280" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="290" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">L0</text><rect x="660" y="260" width="280" height="120" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="800" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A93226">Recovery</text><rect x="1170" y="260" width="280" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="1310" y="330" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#0B6B57">L0 again</text><path d="M430 320 H650 M940 320 H1160" stroke="#34495E" stroke-width="5"/><text x="800" y="550" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">speed change、retrain、lane problem 或 error recovery 都可能让 Link 进入 Recovery。</text></svg>