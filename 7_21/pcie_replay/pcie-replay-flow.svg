<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800"><rect width="1600" height="800" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">ACK、NAK 与 Replay：一笔 TLP 的可靠传输路径</text><rect x="90" y="290" width="240" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="210" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">send TLP</text><rect x="430" y="290" width="240" height="120" rx="18" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="550" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#0B6B57">store replay</text><rect x="770" y="290" width="240" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="890" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">check LCRC</text><rect x="1110" y="220" width="240" height="100" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1230" y="280" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1D5D3A">ACK</text><rect x="1110" y="450" width="240" height="100" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="1230" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A93226">NAK</text><path d="M330 350 H420 M670 350 H760 M1010 330 H1100" stroke="#34495E" stroke-width="5"/><path d="M1010 390 C1080 440 1080 500 1100 500" stroke="#C0392B" stroke-width="5" fill="none"/><path d="M1110 500 C860 650 600 650 550 420" stroke="#C0392B" stroke-width="5" fill="none"/><text x="800" y="700" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">ACK 后释放 replay entry；NAK 或 replay timeout 后，从 Replay Buffer 重新发送未确认 TLP。</text></svg>