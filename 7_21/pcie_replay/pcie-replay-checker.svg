<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620"><rect width="1600" height="620" fill="#FFFFFF"/><rect width="1600" height="80" fill="#159477"/><text x="54" y="51" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#FFFFFF">Code Demo：PCIe replay tracker</text><rect x="40" y="98" width="110" height="460" rx="10" fill="#F4F6F7"/><rect x="40" y="98" width="1520" height="460" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/><text x="112" y="180" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">01</text><text x="188" y="180" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">on_tlp_send(seq_num, tlp): replay_q.push_back(tlp)</text><text x="112" y="230" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">02</text><text x="188" y="230" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">on_ack(seq_num): release_entries_through(seq_num)</text><text x="112" y="280" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">03</text><text x="188" y="280" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">on_nak(seq_num): replay_from(seq_num)</text><text x="112" y="330" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">04</text><text x="188" y="330" font-family="DejaVu Sans Mono" font-size="34" fill="#23313F">on_replay_timeout(): replay_oldest_unacked()</text></svg>