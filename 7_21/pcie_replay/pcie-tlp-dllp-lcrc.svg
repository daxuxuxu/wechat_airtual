<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><rect width="1600" height="760" fill="#FFFFFF"/><rect width="1600" height="86" fill="#159477"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">TLP、DLLP 与 LCRC：谁负责业务，谁负责可靠传输</text><rect x="100" y="210" width="640" height="250" rx="20" fill="#EAF8F1" stroke="#159477" stroke-width="3"/><text x="150" y="275" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#0B6B57">TLP</text><text x="150" y="335" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">Memory / Configuration / Completion</text><text x="150" y="390" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">业务 transaction payload</text><rect x="860" y="210" width="640" height="250" rx="20" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="910" y="275" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">Data Link Layer</text><text x="910" y="335" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">Sequence Number + LCRC</text><text x="910" y="390" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">ACK / NAK / Replay control</text><text x="800" y="610" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">TLP 像业务包；DLLP 像链路层的签收与重传通知；LCRC 用于检查链路传输是否损坏。</text></svg>