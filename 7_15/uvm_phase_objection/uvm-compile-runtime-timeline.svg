<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="880" viewBox="0 0 1600 880" role="img" aria-label="UVM 编译与运行的分界"><rect width="1600" height="880" fill="#FFFFFF"/><text x="800" y="58" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="46" font-weight="700" fill="#23313F">UVM 编译与运行的分界</text><text x="800" y="95" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="25" fill="#566573">phase 不是 compile order；它发生在 simulator 已启动之后</text><rect x="70" y="190" width="300" height="180" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="220" y="270" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#1F6FB5">Compile</text><text x="220" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="28" fill="#1B4F72">class、module、package</text><rect x="470" y="190" width="300" height="180" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="620" y="270" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#A84B00">Elaboration</text><text x="620" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="28" fill="#7E3C00">top、interface、DUT</text><rect x="870" y="190" width="300" height="180" rx="18" fill="#EBF5FB" stroke="#2E86C1" stroke-width="3"/><text x="1020" y="270" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#1B4F72">UVM build</text><text x="1020" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="28" fill="#1B4F72">build、connect、end_of_elab</text><rect x="1270" y="190" width="260" height="180" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1400" y="270" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#1D5D3A">Runtime</text><text x="1400" y="325" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="28" fill="#1D5D3A">run_phase</text><path d="M370 280 H460 M770 280 H860 M1170 280 H1260" stroke="#34495E" stroke-width="5"/><rect x="185" y="560" width="1230" height="145" rx="18" fill="#F4F6F7" stroke="#AAB7B8" stroke-width="2"/><text x="800" y="620" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#23313F">关键点：build_phase 创建的是 UVM object hierarchy，不是 Verilog module hierarchy。</text><text x="800" y="670" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="30" fill="#34495E">objection 只影响 runtime phase 何时结束，不会回头改变 compile 或 build 的结果。</text></svg>