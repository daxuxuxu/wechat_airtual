"DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">05</text><text x="188" y="386" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">endfunction</text><text x="112" y="436" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">06</text><text x="188" y="436" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F"></text><text x="112" y="486" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">07</text><text x="188" y="486" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">function void connect_phase(uvm_phase phase);</text><text x="112" y="536" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">08</text><text x="188" y="536" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  monitor.ap.connect(scoreboard.analysis_export);</text><text x="112" y="586" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">09</text><text x="188" y="586" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">endfunction</text></svg>