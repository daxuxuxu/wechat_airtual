<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="514" viewBox="0 0 1600 514" role="img" aria-label="run_phase 中正确使用 objection"><rect width="1600" height="514" fill="#FFFFFF"/><rect width="1600" height="80" fill="#1F6FB5"/><text x="54" y="51" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">run_phase 中正确使用 objection</text><rect x="1240" y="19" width="310" height="42" rx="21" fill="#23313F"/><text x="1395" y="48" text-anchor="middle" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="27" font-weight="700" fill="#FFFFFF">SystemVerilog</text><rect x="40" y="98" width="110" height="376" rx="10" fill="#F4F6F7"/><rect x="40" y="98" width="1520" height="376" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/><text x="112" y="186" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">01</text><text x="188" y="186" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">task run_phase(uvm_phase phase);</text><text x="112" y="236" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">02</text><text x="188" y="236" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  phase.raise_objection(this, &quot;start stimulus&quot;);</text><text x="112" y="286" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">03</text><text x="188" y="286" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  sequence.start(sequencer);</text><text x="112" y="336" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">04</text><text x="188" y="336" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  wait_for_all_responses();</text><text x="112" y="386" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">05</text><text x="188" y="386" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  phase.drop_objection(this, &quot;stimulus complete&quot;);</text><text x="112" y="436" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">06</text><text x="188" y="436" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">endtask</text></svg>