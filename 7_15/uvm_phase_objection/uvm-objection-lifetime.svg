<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840" role="img" aria-label="objection 如何保持 run_phase"><rect width="1600" height="840" fill="#FFFFFF"/><text x="800" y="58" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="46" font-weight="700" fill="#23313F">objection 如何保持 run_phase</text><path d="M150 610 H1460" stroke="#23313F" stroke-width="4"/><text x="150" y="660" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="25" fill="#23313F">时间</text><rect x="250" y="250" width="1040" height="190" rx="22" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="310" y="315" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="34" font-weight="700" fill="#1F6FB5">run_phase</text><path d="M400 520 V240" stroke="#2E8B57" stroke-width="6"/><text x="400" y="210" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="30" font-weight="700" fill="#1D5D3A">raise</text><path d="M1120 520 V240" stroke="#C0392B" stroke-width="6"/><text x="1120" y="210" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="30" font-weight="700" fill="#A93226">drop</text><rect x="430" y="335" width="650" height="62" rx="31" fill="#2E8B57"/><text x="755" y="377" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="31" font-weight="700" fill="#FFFFFF">objection count &gt; 0，phase 保持运行</text><text x="800" y="745" text-anchor="middle" font-family="Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif" font-size="31" fill="#34495E">没有 raise objection 时，如果没有其他 component 保持 objection，run_phase 可以在零仿真时间结束。</text></svg>