<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780"><rect width="1600" height="780" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">AXI burst 的地址推进</text><text x="70" y="83" font-family="Noto Sans CJK SC,Arial" font-size="23" fill="#B9D7F5">每一个 beat 的 byte 数由 AxSIZE 决定，beat 数由 AxLEN + 1 决定</text><path d="M130 420 H1460" stroke="#34495E" stroke-width="5"/><text x="130" y="490" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#23313F">start address</text><rect x="250" y="300" width="170" height="100" rx="16" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="335" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 0</text><rect x="490" y="300" width="170" height="100" rx="16" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="575" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 1</text><rect x="730" y="300" width="170" height="100" rx="16" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="815" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 2</text><rect x="970" y="300" width="170" height="100" rx="16" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1055" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 3</text><rect x="1210" y="300" width="170" height="100" rx="16" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1295" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 4</text><text x="800" y="610" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#23313F">INCR burst：next_addr = current_addr + bytes_per_beat</text><text x="800" y="660" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="29" fill="#34495E">FIXED 保持地址不变；WRAP 在合法边界内回绕。</text></svg>