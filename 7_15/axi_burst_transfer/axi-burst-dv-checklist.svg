<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">Burst Transfer：DV 检查清单</text><rect x="70" y="160" width="1460" height="540" rx="20" fill="#F4F6F7" stroke="#D5D8DC" stroke-width="2"/><rect x="120" y="210" width="1360" height="78" rx="14" fill="#FFFFFF" stroke="#1F6FB5" stroke-width="3"/><text x="160" y="260" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#23313F">AxLEN + 1 是否等于实际 beat 数</text><rect x="120" y="310" width="1360" height="78" rx="14" fill="#FFFFFF" stroke="#E67E22" stroke-width="3"/><text x="160" y="360" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#23313F">AxSIZE 是否正确决定每拍 byte 数</text><rect x="120" y="410" width="1360" height="78" rx="14" fill="#FFFFFF" stroke="#1F6FB5" stroke-width="3"/><text x="160" y="460" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#23313F">WLAST／RLAST 是否只在最后一个 beat 出现</text><rect x="120" y="510" width="1360" height="78" rx="14" fill="#FFFFFF" stroke="#E67E22" stroke-width="3"/><text x="160" y="560" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#23313F">INCR／FIXED／WRAP 地址规则是否正确</text><rect x="120" y="610" width="1360" height="78" rx="14" fill="#FFFFFF" stroke="#1F6FB5" stroke-width="3"/><text x="160" y="660" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#23313F">burst 是否跨越非法 4KB boundary</text><text x="800" y="770" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#566573">建议同时覆盖 read、write、不同 burst type 与 backpressure。</text></svg>