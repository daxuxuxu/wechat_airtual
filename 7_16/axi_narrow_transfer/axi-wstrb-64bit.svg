<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">64-bit WDATA 与 WSTRB 的 byte lane 映射</text><text x="70" y="83" font-family="Noto Sans CJK SC,Arial" font-size="23" fill="#B9D7F5">每个 WSTRB bit 对应 WDATA 上连续的 8 bit</text><rect x="120" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="195" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[7:0]</text><rect x="120" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="195" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[0]</text><path d="M195 400 V455" stroke="#34495E" stroke-width="4"/><rect x="290" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="365" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[15:8]</text><rect x="290" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="365" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[1]</text><path d="M365 400 V455" stroke="#34495E" stroke-width="4"/><rect x="460" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="535" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[23:16]</text><rect x="460" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="535" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[2]</text><path d="M535 400 V455" stroke="#34495E" stroke-width="4"/><rect x="630" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="705" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[31:24]</text><rect x="630" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="705" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[3]</text><path d="M705 400 V455" stroke="#34495E" stroke-width="4"/><rect x="800" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="875" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[39:32]</text><rect x="800" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="875" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[4]</text><path d="M875 400 V455" stroke="#34495E" stroke-width="4"/><rect x="970" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1045" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[47:40]</text><rect x="970" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1045" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[5]</text><path d="M1045 400 V455" stroke="#34495E" stroke-width="4"/><rect x="1140" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1215" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[55:48]</text><rect x="1140" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1215" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[6]</text><path d="M1215 400 V455" stroke="#34495E" stroke-width="4"/><rect x="1310" y="290" width="150" height="100" rx="12" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1385" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#23313F">WDATA[63:56]</text><rect x="1310" y="465" width="150" height="72" rx="12" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1385" y="511" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB[7]</text><path d="M1385 400 V455" stroke="#34495E" stroke-width="4"/><text x="800" y="680" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#23313F">WSTRB bit 为 1，表示对应 byte lane 的 WDATA 内容有效并应更新到 target memory。</text><text x="800" y="735" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="29" fill="#34495E">WSTRB bit 为 0，表示该 byte lane 不应更新。</text></svg>