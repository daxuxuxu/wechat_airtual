<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">连续 Narrow Transfer：address 与 WSTRB 一起推进</text><rect x="90" y="190" width="1420" height="470" rx="20" fill="#F4F6F7" stroke="#D5D8DC" stroke-width="2"/><rect x="150" y="260" width="280" height="110" rx="14" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="290" y="315" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 0</text><text x="290" y="355" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#23313F">address + 0 × step</text><rect x="150" y="450" width="280" height="80" rx="14" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="290" y="502" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB = lane mask</text><rect x="550" y="260" width="280" height="110" rx="14" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="690" y="315" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 1</text><text x="690" y="355" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#23313F">address + 1 × step</text><rect x="550" y="450" width="280" height="80" rx="14" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="690" y="502" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB = lane mask</text><rect x="950" y="260" width="280" height="110" rx="14" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1090" y="315" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">beat 2</text><text x="1090" y="355" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#23313F">address + 2 × step</text><rect x="950" y="450" width="280" height="80" rx="14" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1090" y="502" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="30" font-weight="700" fill="#A84B00">WSTRB = lane mask</text><text x="800" y="740" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">连续窄写中，address 依 AxSIZE 推进，WSTRB 必须移动到新的有效 byte lane。</text></svg>