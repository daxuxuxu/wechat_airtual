<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800"><rect width="1600" height="800" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">MSI：把 interrupt 转成 Memory Write</text><rect x="110" y="280" width="280" height="140" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="250" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1F6FB5">Function event</text><rect x="660" y="280" width="280" height="140" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">MSI memory write</text><text x="800" y="385" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#A84B00">address + data</text><rect x="1210" y="280" width="280" height="140" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1350" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">Interrupt handler</text><path d="M390 350 H650 M940 350 H1200" stroke="#34495E" stroke-width="5"/><text x="800" y="630" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" fill="#23313F">PCIe 不再依赖传统 interrupt pin，而是通过 message-like memory transaction 通知 software。</text></svg>