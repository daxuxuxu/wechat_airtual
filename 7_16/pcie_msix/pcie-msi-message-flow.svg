<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680"><rect width="1600" height="680" fill="#FFFFFF"/><rect width="1600" height="86" fill="#23313F"/><text x="60" y="55" font-family="Noto Sans CJK SC,Arial" font-size="42" font-weight="700" fill="#FFFFFF">MSI：中断就是一笔 Memory Write</text><rect x="120" y="260" width="280" height="120" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="260" y="332" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1F6FB5">Function Event</text><rect x="660" y="260" width="280" height="120" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="800" y="320" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#A84B00">Message Write</text><text x="800" y="360" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="24" fill="#A84B00">address + data</text><rect x="1200" y="260" width="280" height="120" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1340" y="332" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#1D5D3A">Software Handler</text><path d="M400 320 H650 M940 320 H1190" stroke="#34495E" stroke-width="5"/><text x="800" y="540" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="30" fill="#34495E">每个 vector 可选择不同的 message destination。</text></svg>