<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">MSI-X：Table、PBA、mask 与 pending</text><rect x="100" y="180" width="620" height="400" rx="20" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="150" y="245" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1F6FB5">MSI-X Table</text><text x="150" y="310" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">每个 vector 保存 message address</text><text x="150" y="365" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">message data 与 vector control</text><rect x="880" y="180" width="620" height="400" rx="20" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="930" y="245" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A84B00">PBA</text><text x="930" y="310" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">vector 被 mask 时，event 可记录 pending</text><text x="930" y="365" font-family="Noto Sans CJK SC,Arial" font-size="31" fill="#23313F">unmask 后按设计规则重新触发</text><text x="800" y="710" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">DV 必须同时检查 Function enable、vector mask、pending bit 与 BAR table access。</text></svg>