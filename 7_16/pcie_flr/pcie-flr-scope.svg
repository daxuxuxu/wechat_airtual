<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800"><rect width="1600" height="800" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">FLR 的作用范围：Function，不是整条 Link</text><rect x="140" y="210" width="1320" height="390" rx="24" fill="#F4F6F7" stroke="#AAB7B8" stroke-width="3"/><text x="200" y="270" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#23313F">一个 PCIe device</text><rect x="250" y="340" width="300" height="150" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="400" y="425" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1F6FB5">Function A</text><rect x="650" y="340" width="300" height="150" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="5"/><text x="800" y="425" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#A93226">Function B</text><text x="800" y="470" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="28" fill="#A93226">FLR target</text><rect x="1050" y="340" width="300" height="150" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1200" y="425" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1D5D3A">Function C</text><text x="800" y="700" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" fill="#23313F">目标 Function state 必须重置；其他 Function 的 traffic 与 state 不应被误影响。</text></svg>