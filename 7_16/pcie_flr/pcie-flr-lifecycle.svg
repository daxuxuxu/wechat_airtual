<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840"><rect width="1600" height="840" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">FLR 生命周期：从请求到重新可用</text><rect x="110" y="280" width="250" height="130" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="235" y="355" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#1F6FB5">FLR Request</text><rect x="500" y="280" width="250" height="130" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="625" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#A93226">quiesce</text><text x="625" y="382" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#A93226">stop new request</text><rect x="890" y="280" width="250" height="130" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1015" y="340" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#A84B00">cleanup</text><text x="1015" y="382" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#A84B00">clear state</text><rect x="1280" y="280" width="210" height="130" rx="18" fill="#E8F8F5" stroke="#2E8B57" stroke-width="3"/><text x="1385" y="355" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="33" font-weight="700" fill="#1D5D3A">ready</text><path d="M360 345 H490 M750 345 H880 M1140 345 H1270" stroke="#34495E" stroke-width="5"/><text x="800" y="610" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#23313F">需要处理 in-flight request、outstanding entry、stale completion 与 configuration state。</text><text x="800" y="670" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="29" fill="#566573">reset 完成后，Function 才能重新接受 configuration 与 memory request。</text></svg>