<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820"><rect width="1600" height="820" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">Unaligned Write：首拍 WSTRB 与后续 beat</text><rect x="100" y="190" width="1400" height="200" rx="20" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="150" y="255" font-family="Noto Sans CJK SC,Arial" font-size="38" font-weight="700" fill="#A84B00">first beat</text><text x="150" y="320" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">start address 不对齐，WSTRB 只断言包含有效数据的 byte lane。</text><rect x="940" y="270" width="420" height="76" rx="14" fill="#FFFFFF" stroke="#E67E22" stroke-width="3"/><text x="1150" y="319" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="32" font-weight="700" fill="#A84B00">WSTRB = partial mask</text><rect x="100" y="470" width="1400" height="200" rx="20" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="150" y="535" font-family="Noto Sans CJK SC,Arial" font-size="38" font-weight="700" fill="#1F6FB5">following beat</text><text x="150" y="600" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">address 按 burst rule 推进；有效 lane 根据新的 address 与 AxSIZE 重新计算。</text><rect x="940" y="550" width="420" height="76" rx="14" fill="#FFFFFF" stroke="#1F6FB5" stroke-width="3"/><text x="1150" y="599" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="32" font-weight="700" fill="#1F6FB5">WSTRB = next lane mask</text></svg>