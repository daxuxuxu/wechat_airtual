<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840"><rect width="1600" height="840" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">Aligned 与 Unaligned Transfer 的有效 byte lane</text><text x="70" y="83" font-family="Noto Sans CJK SC,Arial" font-size="23" fill="#B9D7F5">深色 byte 表示根据 start address 与 control information 不参与当前 transfer</text><text x="100" y="190" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#1F6FB5">Aligned start</text><text x="100" y="470" font-family="Noto Sans CJK SC,Arial" font-size="36" font-weight="700" fill="#E67E22">Unaligned start</text><rect x="400" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="460" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 0</text><rect x="400" y="440" width="120" height="120" fill="#34495E" stroke="#E67E22" stroke-width="3"/><text x="460" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#FFFFFF">byte 0</text><rect x="535" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="595" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 1</text><rect x="535" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="595" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 1</text><rect x="670" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="730" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 2</text><rect x="670" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="730" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 2</text><rect x="805" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="865" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 3</text><rect x="805" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="865" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 3</text><rect x="940" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1000" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 4</text><rect x="940" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1000" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 4</text><rect x="1075" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1135" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 5</text><rect x="1075" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1135" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 5</text><rect x="1210" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1270" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 6</text><rect x="1210" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1270" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 6</text><rect x="1345" y="160" width="120" height="120" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="1405" y="230" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 7</text><rect x="1345" y="440" width="120" height="120" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="1405" y="510" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" fill="#23313F">byte 7</text><text x="800" y="670" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" fill="#23313F">非对齐起始 address 会让首拍只覆盖部分 byte lane；后续 beat 可恢复为完整 lane 覆盖。</text><text x="800" y="730" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="29" fill="#566573">write 使用 WSTRB 表示有效 lane；read 由 address、AxSIZE 与 target 返回规则决定。</text></svg>