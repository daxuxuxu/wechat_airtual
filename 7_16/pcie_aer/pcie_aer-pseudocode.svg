<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="514" viewBox="0 0 1600 514"><rect width="1600" height="514" fill="#FFFFFF"/><rect width="1600" height="80" fill="#1F6FB5"/><text x="54" y="51" font-family="Noto Sans CJK SC,Arial" font-size="38" font-weight="700" fill="#FFFFFF">AER error handling 伪代码</text><rect x="40" y="98" width="110" height="376" rx="10" fill="#F4F6F7"/><rect x="40" y="98" width="1520" height="376" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/><text x="112" y="186" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">01</text><text x="188" y="186" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">on_pcie_error(error_type):</text><text x="112" y="236" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">02</text><text x="188" y="236" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  set_error_status(error_type)</text><text x="112" y="286" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">03</text><text x="188" y="286" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  if not error_masked(error_type):</text><text x="112" y="336" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">04</text><text x="188" y="336" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">    report_error(error_type)</text><text x="112" y="386" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">05</text><text x="188" y="386" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">  if fatal(error_type):</text><text x="112" y="436" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="28" fill="#7F8C8D">06</text><text x="188" y="436" xml:space="preserve" font-family="DejaVu Sans Mono,Consolas,monospace" font-size="35" fill="#23313F">    start_recovery_path()</text></svg>