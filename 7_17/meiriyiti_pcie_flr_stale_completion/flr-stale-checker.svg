<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620"><rect width="1600" height="620" fill="#FFFFFF"/><rect width="1600" height="80" fill="#1F6FB5"/><text x="54" y="51" font-family="Noto Sans CJK SC,Arial" font-size="38" font-weight="700" fill="#FFFFFF">NBIF／HPHOST 类 request tracker：stale Completion checker 伪代码</text><rect x="40" y="98" width="110" height="460" rx="10" fill="#F4F6F7"/><rect x="40" y="98" width="1520" height="460" rx="10" fill="none" stroke="#D5D8DC" stroke-width="2"/><text x="112" y="180" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">01</text><text x="188" y="180" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">on_flr(target_function):</text><text x="112" y="230" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">02</text><text x="188" y="230" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">  clear_request_entries(target_function)</text><text x="112" y="280" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">03</text><text x="188" y="280" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">  increment_reset_epoch(target_function)</text><text x="112" y="330" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">04</text><text x="188" y="330" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">on_completion(requester_id, tag):</text><text x="112" y="380" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">05</text><text x="188" y="380" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">  if no_active_entry(requester_id, tag): report_stale()</text><text x="112" y="430" font-family="DejaVu Sans Mono" font-size="28" fill="#7F8C8D">06</text><text x="188" y="430" font-family="DejaVu Sans Mono" font-size="35" fill="#23313F">  else: match_completion_to_current_epoch()</text></svg>