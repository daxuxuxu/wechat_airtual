<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840"><rect width="1600" height="840" fill="#FFFFFF"/><rect width="1600" height="94" fill="#23313F"/><text x="70" y="57" font-family="Noto Sans CJK SC,Arial" font-size="46" font-weight="700" fill="#FFFFFF">FLR 后 stale Completion 的形成路径</text><rect x="100" y="280" width="260" height="140" rx="18" fill="#EAF2F8" stroke="#1F6FB5" stroke-width="3"/><text x="230" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#1F6FB5">MRd issue</text><rect x="470" y="280" width="260" height="140" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="600" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A93226">FLR</text><rect x="840" y="280" width="260" height="140" rx="18" fill="#FEF5E7" stroke="#E67E22" stroke-width="3"/><text x="970" y="350" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A84B00">tag reuse</text><rect x="1210" y="280" width="290" height="140" rx="18" fill="#FDEDEC" stroke="#C0392B" stroke-width="3"/><text x="1355" y="335" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="32" font-weight="700" fill="#A93226">old Completion</text><text x="1355" y="380" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="27" fill="#A93226">must not match new request</text><path d="M360 350 H460 M730 350 H830 M1100 350 H1200" stroke="#34495E" stroke-width="5"/><text x="800" y="650" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="34" font-weight="700" fill="#23313F">FLR 清理 request state 后，旧 Completion 仍可能从 PCIe fabric 返回。</text><text x="800" y="710" text-anchor="middle" font-family="Noto Sans CJK SC,Arial" font-size="29" fill="#566573">checker 必须把它识别为 stale response，而不是 reset 后新 request 的合法 Completion。</text></svg>